name: test go
description: Run the Go test suite across the workspace with coverage and upload the report.

inputs:
  test_artifact:
    required: false
    description: The name of the artifact to store the test report.
    default: go-test
  coverage_artifact:
    required: false
    description: The name of the artifact to store the coverage report.
    default: coverage
  test_file:
    required: false
    description: The name of the test report file.
    default: tests.json
  coverage_file:
    required: false
    description: The name of the coverage report file.
    default: coverage.txt
  skip_setup:
    required: false
    description: Skip the setup steps.
  filter_patterns:
    required: false
    description: The file patterns to filter.
    default: "| grep -v /mocks | grep -v /test | grep -v /proto"
  filter_extra_patterns:
    required: false
    description: The file patterns to filter, appended to filter_patterns.
    default: ""
  modfile:
    required: false
    description: The go.mod file to use.
    default: go.mod

outputs:
  artifact-id:
    description: The coverage artifact id.
    value: ${{ steps.upload-artifact.outputs.artifact-id }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v7
      if: ${{ inputs.skip_setup != 'true' }}
    - uses: actions/setup-go@v7.0.0
      if: ${{ inputs.skip_setup != 'true' }}
      with:
        go-version-file: "go.mod"
    - name: download go packages
      if: ${{ inputs.skip_setup != 'true' }}
      shell: bash
      run: go mod download
    - name: discover modules
      shell: bash
      id: discover
      run: |
        # Enumerate every package across every module. Iterating modules from
        # `go list -m` is what makes this work in a Go workspace, where packages
        # span more than one module and a single `go list ./...` reaches only one.
        #
        # Every read is checked, and the resulting set has to be non-empty. An empty MODULES is
        # passed to gotestsum as no package arguments at all, which makes it default to `.` — a
        # directory that in most of these modules holds no test files. It reports `DONE 0 tests`
        # and exits 0, coverage comes out as the bare `mode: set` header, and the job goes green
        # having run nothing. This action is the only place these tests run.
        discover_modules() {
          local root modules mod packages

          if ! root=$(go list .); then
            echo "::error::go list . failed — cannot derive the module path prefix"
            return 1
          fi

          if ! modules=$(go list -m); then
            echo "::error::go list -m failed — cannot enumerate the modules"
            return 1
          fi

          : >modules.txt

          for mod in $modules; do
            if ! packages=$(go list "${mod//$root/.}/..."); then
              echo "::error::go list failed for module ${mod}"
              return 1
            fi

            # A module contributing nothing is legitimate — every one of its packages may be
            # filtered out, and then the filter chain's last grep exits 1. Only the emptiness of
            # the whole set is a failure, so it is checked once, below.
            [ -n "$packages" ] || continue

            printf '%s\n' "$packages" ${{ inputs.filter_patterns }} ${{ inputs.filter_extra_patterns }} >>modules.txt
          done

          if [ ! -s modules.txt ]; then
            echo "::error::discovery produced no packages — the test run would report success having run nothing"
            return 1
          fi
        }

        discover_modules || exit 1

        echo "MODULES=$(tr '\n' ' ' <modules.txt)" >>"$GITHUB_ENV"
    - name: run tests
      shell: bash
      run: |
        go tool -modfile=${{ inputs.modfile }} gotestsum --jsonfile ${{ inputs.test_file }} --format pkgname \
          -- -count=1 -cover -coverprofile=${{ inputs.coverage_file }} -json ${{ env.MODULES }}

        go tool cover -func ${{ inputs.coverage_file }}
    - name: archive code coverage results
      id: upload-artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.coverage_artifact }}
        path: ${{ inputs.coverage_file }}
    - name: archive test results
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.test_artifact }}
        path: ${{ inputs.test_file }}
