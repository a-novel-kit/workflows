name: setup node
description: Authenticate as the GitHub App, set up pnpm and Node against the GitHub package registry, and install dependencies.

inputs:
  github_token:
    required: true
    description: The GitHub token to use for the action.
  app_private_key:
    required: true
    description: The GitHub App private key.
  client_id:
    required: false
    description: GitHub App client id (recommended).
  ref:
    required: false
    description: >
      Ref to check out (forwarded to pull-bot). Defaults to github.head_ref; pass a
      release tag when publishing from a dispatched release so the build is the
      bumped commit, not the pre-bump default branch.
    default: ""

outputs:
  token:
    description: The bot token.
    value: ${{ steps.app_token.outputs.token }}
  app_login:
    description: The login name of the bot.
    value: ${{ steps.app_token.outputs.app_login }}

runs:
  using: "composite"
  steps:
    - uses: a-novel-kit/workflows/generic-actions/pull-bot@v1.17.0
      id: app_token
      with:
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}
        ref: ${{ inputs.ref }}
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        package-manager-cache: false
        node-version: "lts/*"
        cache: pnpm
        registry-url: "https://npm.pkg.github.com"
    - name: setup github registry
      shell: bash
      run: |
        pnpm config set "@a-novel:registry" "https://npm.pkg.github.com"
        pnpm config set "@a-novel-kit:registry" "https://npm.pkg.github.com"
        pnpm config set "//npm.pkg.github.com/:_authToken" "${{ inputs.github_token }}"
    - name: install dependencies
      shell: bash
      run: pnpm i --frozen-lockfile
