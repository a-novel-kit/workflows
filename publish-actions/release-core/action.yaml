name: release core
description: >
  Cut a release in CI: bump the version (package.json, workspace-aware), stamp
  in-repo version refs, commit, push the tags (a root vX.Y.Z plus any sub-module
  tags — see plan.cjs), and create the GitHub Release. The release-type selector
  and the protected `release` environment live in the caller.

inputs:
  release_type:
    required: true
    description: Semver bump to apply — patch, minor, or major.
  client_id:
    required: true
    description: >
      [Agent] App client ID. Needs contents:write plus a branch/tag-protection bypass,
      since the bump commit lands on the protected default branch and the tag is
      protected (v*).
  app_private_key:
    required: true
    description: The [Agent] App private key (PEM) — the AGENT_BOT_PRIVATE_KEY org secret.
  dry_run:
    required: false
    default: "false"
    description: >
      When "true", bump and report the version/tag but do NOT commit, tag, push,
      or release — the working tree is reverted. Lets a release be rehearsed
      safely before the bot has push rights.

outputs:
  version:
    description: The bumped version (e.g. 1.2.3).
    value: ${{ steps.cut.outputs.version }}
  tag:
    description: The root release tag — always vX.Y.Z.
    value: ${{ steps.cut.outputs.tag }}
  tags:
    description: Every tag cut, newline-separated — root vX.Y.Z plus any <subdir>/vX.Y.Z sub-module tags.
    value: ${{ steps.cut.outputs.tags }}

runs:
  using: composite
  steps:
    # Releases run from the default branch only, so a dispatch or workflow_call
    # from any other ref is rejected before a token is minted or anything is
    # mutated: a bump tag pushed from a feature branch would be wrong.
    - name: Guard — default branch only
      shell: bash
      run: |
        if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
          echo "::error::releases run from the default branch (${{ github.event.repository.default_branch }}) only — got '${{ github.ref_name }}'"
          exit 1
        fi

    # Token that can push the bump commit and tag and create the release, scoped to this repo.
    # `workflows` is needed alongside `contents` because the self-pin sync rewrites the version in
    # `.github/workflows/*` self-refs, and GitHub refuses an App push touching workflow files without
    # it, answering GH013 "without workflows permission".
    - name: Mint push token
      id: token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ github.event.repository.name }}
        permission-contents: write
        permission-workflows: write

    # Bot-authenticated checkout so the later push carries the bot's rights, with
    # full history and tags so the tag and release notes resolve.
    - name: Checkout
      uses: actions/checkout@v7
      with:
        token: ${{ steps.token.outputs.token }}
        ref: ${{ github.ref_name }}
        fetch-depth: 0
        fetch-tags: true

    - name: Setup node
      uses: actions/setup-node@v7
      with:
        node-version: lts/*
    - name: Enable pnpm
      shell: bash
      run: corepack enable

    # Only repos that stamp docs, through a prepublish:doc script, need the a-novel CLI.
    - name: Detect prepublish:doc
      id: stamp
      shell: bash
      run: |
        if node -e "process.exit(require('./package.json').scripts?.['prepublish:doc']?0:1)" 2>/dev/null; then
          echo "needed=true" >> "$GITHUB_OUTPUT"
        else
          echo "needed=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Setup Go
      if: ${{ steps.stamp.outputs.needed == 'true' }}
      uses: actions/setup-go@v7.0.0
      with:
        go-version: stable
        # This step only `go install`s the a-novel CLI, so there is nothing to cache.
        cache: false
    - name: Install a-novel CLI (for stamp)
      if: ${{ steps.stamp.outputs.needed == 'true' }}
      shell: bash
      run: |
        go install github.com/a-novel-kit/stack/cli/cmd/a-novel@latest
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Cut release
      id: cut
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        APP_SLUG: ${{ steps.token.outputs.app-slug }}
        RELEASE_TYPE: ${{ inputs.release_type }}
        DRY_RUN: ${{ inputs.dry_run }}
        BRANCH: ${{ github.ref_name }}
        STAMP_NEEDED: ${{ steps.stamp.outputs.needed }}
      run: |
        set -euo pipefail

        case "$RELEASE_TYPE" in
          patch | minor | major) ;;
          *) echo "::error::release_type must be patch, minor, or major (got '$RELEASE_TYPE')"; exit 1 ;;
        esac

        git config user.name "${APP_SLUG}[bot]"
        git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"

        # Version bump across package.json at the root and in every workspace member.
        # Plain Node runs it, which skips pnpm's cold-store supply-chain pass. See bump.cjs.
        node "$GITHUB_ACTION_PATH/bump.cjs"

        # Refresh doc version refs through `a-novel publish stamp` where that script exists.
        # The env var skips pnpm's pre-run install, which would need npm-registry auth.
        if [ "$STAMP_NEEDED" = "true" ]; then
          PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN=false pnpm run prepublish:doc
        fi

        version=$(node -p "require('./package.json').version")

        # Stamp in-repo version refs and compute the tags: the root vX.Y.Z plus any
        # sub-module tags. A new ecosystem is added in plan.cjs.
        tags=$(node "$GITHUB_ACTION_PATH/plan.cjs")
        root_tag="v${version}"

        {
          echo "version=$version"
          echo "tag=$root_tag"
          echo "tags<<__TAGS__"
          printf '%s\n' "$tags"
          echo "__TAGS__"
        } >> "$GITHUB_OUTPUT"
        {
          echo "Release **$version** (bump: $RELEASE_TYPE) — tags:"
          printf '%s\n' "$tags" | sed 's/^/- `/; s/$/`/'
        } | tee -a "$GITHUB_STEP_SUMMARY"

        # Rewrite every self-reference to this repo's own actions and workflows
        # (owner/repo/...@vX.Y.Z) to the version being cut, so the released tag runs its own siblings.
        # A reusable workflow cannot use a relative ref, so without this its sibling pins trail every
        # release: Renovate bumps them, but each bump needs its own release, leaving the tag one
        # behind. Only self-refs are rewritten; cross-repo pins stay Renovate-managed. This is a no-op
        # in a repo that does not self-reference, and is discarded under dry-run.
        repo_esc=$(printf '%s' "$GITHUB_REPOSITORY" | sed 's/\./\\./g')
        selfpin_files=$(git ls-files '*.yaml' '*.yml' | xargs -r grep -lE "${repo_esc}/[A-Za-z0-9._/-]+@v[0-9]+\.[0-9]+\.[0-9]+" 2>/dev/null || true)
        if [ -n "$selfpin_files" ]; then
          printf '%s\n' "$selfpin_files" | while IFS= read -r f; do
            sed -i -E "s#(${repo_esc}/[A-Za-z0-9._/-]+)@v[0-9]+\.[0-9]+\.[0-9]+#\1@v${version}#g" "$f"
          done
          { echo "Self-pins synced → v${version}:"; printf '%s\n' "$selfpin_files" | sed 's/^/- /'; } | tee -a "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$DRY_RUN" = "true" ]; then
          echo "[dry-run] no commit, tag, push, or release." | tee -a "$GITHUB_STEP_SUMMARY"
          git checkout -- . 2>/dev/null || true
          exit 0
        fi

        git add -A
        git commit -m "$version"
        git push origin "HEAD:$BRANCH"
        while IFS= read -r t; do
          [ -n "$t" ] || continue
          git tag "$t"
          git push origin "refs/tags/$t"
        done <<< "$tags"
        gh release create "$root_tag" --repo "$GITHUB_REPOSITORY" \
          --title "${GITHUB_REPOSITORY#*/} ${version}" --generate-notes
        echo "- ✓ released $(printf '%s\n' "$tags" | grep -c .) tag(s), root \`$root_tag\`" | tee -a "$GITHUB_STEP_SUMMARY"
