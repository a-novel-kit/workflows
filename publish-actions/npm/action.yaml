name: publish npm
description: Set up Node, build the package, and publish it to the GitHub npm registry.

inputs:
  build_action:
    required: false
    description: The name of the build command in the package file.
    default: build
  github_token:
    required: true
    description: The GitHub token to use for the action.
  app_private_key:
    required: true
    description: The GitHub App private key.
  client_id:
    required: false
    description: GitHub App client ID (recommended).
  ref:
    required: false
    description: >
      Ref to check out and publish from. Leave empty for the legacy tag-push flow
      (the ref is already the tag). In the dispatched release flow, pass the new
      release tag (needs.release.outputs.tag) so the published package carries the
      bumped version, not the pre-bump default branch.
    default: ""

runs:
  using: "composite"
  steps:
    - uses: a-novel-kit/workflows/node-actions/setup-node@v1.19.1
      id: app_token
      with:
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}
        github_token: ${{ inputs.github_token }}
        ref: ${{ inputs.ref }}
    - name: build
      shell: bash
      run: pnpm run ${{ inputs.build_action }}
    - run: pnpm publish -r --access public
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.github_token }}
