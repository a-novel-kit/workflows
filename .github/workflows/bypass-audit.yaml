# Reusable bypass-audit sweep — the reviewable ledger of every ruleset BYPASS across the org
# (a-novel-kit/.github#95). Governance legibility: an admin merging without an approval, or the bot
# pushing a release tag, bypasses a ruleset; each such event should be recorded with a reason so
# bypasses stay a deliberate, reviewed exception rather than an invisible habit.
#
# Why a PAT: the rule-suites REST API (the only free source of bypass records — the org-level
# endpoint is Enterprise-gated) is NOT reachable by GitHub App / installation tokens ("Resource not
# accessible by integration", even with administration:read — verified). So the READ half uses a
# dedicated fine-grained PAT scoped to administration:read only; the WRITE half (the ledger issue)
# still goes through the [Agent] App, so the PAT never needs write. The `when` (cron) lives in the
# thin per-org caller, like reconcile-board / watchdog.
name: bypass-audit

on:
  workflow_call:
    inputs:
      client_id:
        required: true
        type: string
        description: The org's [Agent] bot App client id — writes the ledger issue (issues:write).
      lookback_hours:
        required: false
        type: string
        default: "168"
        description: Only ingest bypasses pushed within this many hours (default 7 days).
      dry_run:
        required: false
        type: string
        default: "true"
        description: When "true" (default), log the new bypass rows without writing the ledger.
    secrets:
      private_key:
        required: true
        description: The [Agent] bot App private key (PEM) — mints the issues:write ledger token.
      audit_pat:
        required: true
        description: >
          A fine-grained PAT with ONLY Administration:read on the org's repos — reads the rule-suites
          API (App tokens can't). Read-only; it never writes.

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      # App token for the LEDGER write only — scoped to the planning repo, issues:write. The PAT does
      # every read; this token does the one write, so neither holds more than it needs.
      - name: Mint ledger token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.client_id }}
          private-key: ${{ secrets.private_key }}
          owner: ${{ github.repository_owner }}
          repositories: .github
          permission-issues: write
      - name: Collect bypasses and update the ledger
        env:
          AUDIT_PAT: ${{ secrets.audit_pat }}
          LEDGER_TOKEN: ${{ steps.token.outputs.token }}
          ORG: ${{ github.repository_owner }}
          LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          now=$(date -u +%s)
          cutoff=$(( now - LOOKBACK_HOURS * 3600 ))
          PLANNING="${ORG}/.github"

          # ---- READ (PAT): every recent bypass across the org's repos ----------------------------
          # Each row: id|pushed_at|repo|actor|ref|sha12. Time-filter in bash (rule-suites pushed_at
          # carries a +hh:mm offset that jq's fromdateiso8601 rejects; GNU date handles it).
          rows=""
          repos=$(GH_TOKEN="$AUDIT_PAT" gh api "orgs/${ORG}/repos" --paginate --jq '.[].full_name' 2>/dev/null || true)
          while IFS= read -r repo; do
            [ -n "$repo" ] || continue
            bp=$(GH_TOKEN="$AUDIT_PAT" gh api \
              "repos/${repo}/rulesets/rule-suites?rule_suite_result=bypass&per_page=100" 2>/dev/null || echo '[]')
            while IFS= read -r r; do
              [ -n "$r" ] || continue
              pushed=$(printf '%s' "$r" | cut -d'|' -f2)
              ts=$(date -u -d "$pushed" +%s 2>/dev/null || echo 0)
              [ "$ts" -ge "$cutoff" ] && rows="${rows}${r}"$'\n'
            done < <(printf '%s' "$bp" | jq -r '
              (if type=="array" then . else [] end)[]
              | "\(.id)|\(.pushed_at)|\(.repository_name)|\(.actor_name)|\(.ref)|\(.after_sha[0:12])"')
          done < <(printf '%s\n' "$repos")

          # ---- LEDGER (App): find-or-create the ledger issue, then append NEW rows deduped by id ---
          issue=$(GH_TOKEN="$LEDGER_TOKEN" gh issue list --repo "$PLANNING" --label bypass-audit \
            --state open --json number,body --limit 1 2>/dev/null || echo '[]')
          num=$(printf '%s' "$issue" | jq -r '.[0].number // empty')
          body=$(printf '%s' "$issue" | jq -r '.[0].body // ""')
          # ids already in the ledger (each row carries a <!-- rs:<id> --> marker).
          seen=$(printf '%s' "$body" | grep -oE 'rs:[0-9]+' | sed 's/rs://' || true)

          new_rows=""
          new_count=0
          while IFS= read -r r; do
            [ -n "$r" ] || continue
            id=$(printf '%s' "$r" | cut -d'|' -f1)
            printf '%s\n' "$seen" | grep -qx "$id" && continue
            when=$(printf '%s' "$r" | cut -d'|' -f2)
            repo=$(printf '%s' "$r" | cut -d'|' -f3)
            actor=$(printf '%s' "$r" | cut -d'|' -f4)
            ref=$(printf '%s' "$r" | cut -d'|' -f5)
            sha=$(printf '%s' "$r" | cut -d'|' -f6)
            new_rows="${new_rows}| ${when} | ${repo} | ${actor} | \`${ref}\` | ${sha} | _(reason?)_ |<!-- rs:${id} -->"$'\n'
            new_count=$(( new_count + 1 ))
          done <<< "$rows"

          echo "Bypass audit: ${new_count} new bypass(es) in the last ${LOOKBACK_HOURS}h." | tee -a "$GITHUB_STEP_SUMMARY"
          if [ "$new_count" -eq 0 ]; then exit 0; fi

          # Rebuild the table: existing rows + new rows, newest-first (the row starts with the ISO
          # pushed_at, so a reverse lexical sort is chronological), capped so the body stays well under
          # GitHub's 65536-char limit.
          existing_table=$(printf '%s' "$body" | grep -E '<!-- rs:[0-9]+ -->' || true)
          all_rows=$(printf '%s\n%s' "$existing_table" "$new_rows" | grep -E '<!-- rs:[0-9]+ -->' | sort -r | head -400)
          new_body=$(printf '%s\n%s\n\n%s\n%s\n%s\n%s\n' \
            "<!-- bypass-audit-ledger -->" \
            "Automated record of every ruleset **bypass** across \`${ORG}\` (source: each repo's rule-suites API). The bot appends rows newest-first, capped at 400; a human fills the **Reason** for each — a bypass without a recorded reason is the thing this ledger exists to surface." \
            "| When (UTC) | Repo | Actor | Ref | SHA | Reason |" \
            "| --- | --- | --- | --- | --- | --- |" \
            "$all_rows" \
            "")

          if [ "$DRY_RUN" = "true" ]; then
            {
              echo "[dry-run] would record ${new_count} new bypass row(s):"
              printf '%s\n' "$new_rows"
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          tmp=$(mktemp); printf '%s' "$new_body" > "$tmp"
          if [ -n "$num" ]; then
            GH_TOKEN="$LEDGER_TOKEN" gh issue edit "$num" --repo "$PLANNING" --body-file "$tmp" >/dev/null
            echo "Updated bypass-audit ledger #${num} (+${new_count})." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            GH_TOKEN="$LEDGER_TOKEN" gh label create bypass-audit --repo "$PLANNING" --force \
              --color 5319E7 --description "The ruleset bypass audit ledger." >/dev/null 2>&1 || true
            url=$(GH_TOKEN="$LEDGER_TOKEN" gh issue create --repo "$PLANNING" --label bypass-audit \
              --title "🔐 Ruleset bypass audit ledger" --body-file "$tmp")
            echo "Opened bypass-audit ledger ${url} (+${new_count})." | tee -a "$GITHUB_STEP_SUMMARY"
          fi
