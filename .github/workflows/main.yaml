name: main

on:
  push:
    tags-ignore:
      - "**"
    branches:
      - "**"
      # The ephemeral hotfix branches hotfix.yaml pushes and deletes, dry-run drills included, never
      # become PRs, so there is nothing to lint on them.
      - "!hotfix/**"

# Cancel an in-progress lint run when a newer commit lands on the same ref, since the superseded
# run's result is worthless. This workflow only lints, with no release or deploy work that has to
# run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./node-actions/lint-node
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_private_key: ${{ secrets.DEPENDENCY_BOT_PRIVATE_KEY }}
          client_id: ${{ vars.DEPENDENCY_BOT_CLIENT_ID }}

  # A composite action's whole manifest is expression-templated at load time, input descriptions,
  # `run:` strings and the bash comments inside them included. The vars, secrets, needs, matrix and
  # strategy contexts do not exist for a composite action, so a literal `vars.X` template expression
  # anywhere in one — documentation included — makes the action fail to load for every consumer.
  # Caller workflows under .github/workflows may use those contexts; a composite manifest may not.
  # This is a main.yaml job, so repocfg makes it a required check on this repo.
  lint-action-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      # The detector lives in a script so tests/lint-action-manifests.sh runs the shipped code
      # against fixtures, including the violations this gate exists to catch.
      - name: No composite-illegal expression contexts in action manifests
        shell: bash
        run: bash .github/scripts/lint-action-manifests.sh .

  # The landing-saga actions are bash, and their freeze, clear and hold decisions are too costly to
  # get wrong to leave unexercised. Each suite in tests/ extracts the functions it covers straight out
  # of its action manifest and runs them against stubbed network leaves, offline and deterministic.
  test-actions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run the action test suites
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          suites=(tests/*.sh)
          if [ ${#suites[@]} -eq 0 ]; then
            echo "::error::no test suites found under tests/ — the job would pass vacuously"
            exit 1
          fi
          fail=0
          for suite in "${suites[@]}"; do
            echo "::group::$suite"
            bash "$suite" || fail=1
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::at least one action test suite failed"
            exit 1
          fi
          echo "✓ ${#suites[@]} action test suite(s) passed."

  # Shellcheck the repo's bash. The tests/ suites embed each action's shipped functions verbatim
  # (see test-actions above), so linting them lints the saga logic itself — the errexit-under-`||`,
  # pipefail and `local`-scoping semantics the landing decisions turn on. Advisory for now: the step
  # exits 0, so findings are surfaced (count in the run summary, full output in the log) without
  # gating — the suites carry a backlog (dominated by intentional `A && B || C` guards, SC2015) too
  # large to clear in one pass. Phase 2 clears the backlog and swaps `exit 0` for `exit $rc`, so the
  # check fails on findings and becomes required. Tracked in #320.
  lint-shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          files=(tests/*.sh .github/scripts/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no shell files found to lint — the job would pass vacuously"
            exit 1
          fi
          shellcheck -f gcc "${files[@]}" | tee "$RUNNER_TEMP/shellcheck.txt"
          total=$(grep -cE ': (error|warning|note|style):' "$RUNNER_TEMP/shellcheck.txt" || true)
          {
            echo "## shellcheck — advisory (#320)"
            echo ""
            echo "**${total}** finding(s) across ${#files[@]} shell file(s), reported but non-gating."
            echo "Phase 2 clears the backlog and swaps the \`exit 0\` below for \`exit \$rc\`, so the"
            echo "check fails on findings and becomes required."
          } >> "$GITHUB_STEP_SUMMARY"
          # Advisory: surface findings without failing the check (see the job comment and #320).
          exit 0
