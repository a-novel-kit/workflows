name: pull bot
description: Generate a GitHub App token and check out the repository authenticated as the bot.

inputs:
  app_private_key:
    required: true
    description: The GitHub App private key.
  client_id:
    required: false
    description: GitHub App client ID (recommended).
  fetch_depth:
    required: false
    description: Number of commits to fetch. 0 indicates all history for all branches and tags.
    default: "1"
  fetch_tags:
    required: false
    description: Whether to fetch tags, even if fetch-depth > 0.
    default: "false"
  ref:
    required: false
    description: >
      Ref (branch, tag, or SHA) to check out. Defaults to github.head_ref — the PR
      branch on a pull_request event. Pass an explicit ref when the trigger isn't a
      PR: e.g. a dispatched release passes the new release tag so the checkout is the
      bumped commit, not the pre-bump default branch.
    default: ""

outputs:
  token:
    description: The bot token.
    value: ${{ steps.token_client.outputs.token }}
  app_login:
    description: The login name of the bot.
    value: ${{ steps.token_client.outputs.app-slug }}[bot]

runs:
  using: "composite"
  steps:
    # Mint the bot token from the App client ID; passing no app-id avoids the
    # actions/create-github-app-token app-id deprecation warning.
    - name: get app token
      id: token_client
      uses: actions/create-github-app-token@v3
      with:
        private-key: ${{ inputs.app_private_key }}
        client-id: ${{ inputs.client_id }}
    - uses: actions/checkout@v7
      with:
        token: ${{ steps.token_client.outputs.token }}
        ref: ${{ inputs.ref != '' && inputs.ref || github.head_ref }}
        # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config
        persist-credentials: false
        fetch-depth: ${{ inputs.fetch_depth }}
        fetch-tags: ${{ inputs.fetch_tags }}
