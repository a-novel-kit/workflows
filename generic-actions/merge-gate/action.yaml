name: merge-gate
description: >
  Posts the `merge-gate` check-run — the single "may this PR merge?" status — on the
  triggering pull request, or on the merge-queue group. It runs as the [Agent] App (not
  the workflow's own identity) so the check's integration ID is fixed regardless of what
  decides the outcome, letting a ruleset require it by that id.

  Membership is the `epic:<N>` LABEL, not the PR's `Closes` keyword. A PR belongs to Epic
  N iff it carries the `epic:<N>` label — a label needs >= triage to apply, so it is a
  permission-gated assertion of membership, whereas a `Closes` keyword is author-controlled
  and cannot be trusted to define the set. For a labeled PR this action resolves the
  Epic's authorized open sibling PRs (via the epic-membership action) and passes only when
  EVERY member is merge-ready (non-draft + approved), so a set of concurrent cross-repo PRs
  lands together instead of partially. The `Closes` walk survives only as a discovery HINT:
  for an unlabeled PR whose closing issue has a parent Epic, the action suggests adding the
  `epic:<N>` label but still treats the PR as standalone. A PR with no `epic:<N>` label is
  standalone and always passes (the fast path — classified from the event payload alone, so
  the flood of ordinary PRs never depends on an API call and can't be frozen by a blip).

  Holds are posted as `conclusion: failure`, NEVER `neutral`. GitHub counts `neutral`
  (alongside `success` and `skipped`) as a PASSING required check, so a neutral "hold" would
  silently fail open and let a not-yet-ready set merge — the exact hazard this gate exists to
  prevent. When readiness cannot be determined (the member resolve errored, or the label
  search index has not caught up) the gate therefore posts `failure` to HOLD: a held PR only
  waits — the reconcile sweep re-runs and flips it to `success` once the set is ready — and a
  held PR is safe, while a wrongly-passed set is a premature partial landing. It never posts
  `success` on uncertainty.

  On a merge_group event the gate does NOT blindly re-affirm success. It recomputes readiness
  over the Epic's member set on the group head, and posts `failure` — which dequeues the
  group — if the set regressed since enqueue (a member went back to draft, or lost its
  approval). A standalone PR in the queue re-affirms `success` (it was gated at enqueue).

  This action is the only writer of the activation-snapshot marker in the Epic body, which both
  epic-membership and detect-partial-landing read. It captures the set — pending, then frozen — when
  the Epic first holds merge-ready, and retires it to a `retired` tombstone carrying the wave
  boundary once every member has merged. Retirement frees the next set to freeze, so a PR labeled
  after the freeze is held for one wave. A wave with a member closed unmerged did not land and stays
  frozen; the gate names it after 72h. The PR waiting on the next wave is what triggers retirement,
  since a fully merged wave has no open member left to run the gate.

inputs:
  client_id:
    required: true
    description: >
      Client ID of the [Agent] App. Needs checks:write (post the status), plus issues +
      pull-requests read (read a PR's labels and its `Closes` hint, and to mint the nested
      epic-membership token). The App identity is what fixes the check's integration ID.
  app_private_key:
    required: true
    description: Private key (PEM) of that App.
  repo:
    required: false
    default: ${{ github.event.repository.name }}
    description: >
      Repository whose PR to gate (name only; owner is the workflow's org). Defaults to the
      triggering repo; the reconcile sweep passes another repo in the org to re-post there.
  pull_request_number:
    required: false
    default: ${{ github.event.pull_request.number }}
    description: Number of the PR to gate. Defaults to the triggering PR.
  head_sha:
    required: false
    default: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
    description: >
      Head SHA to anchor the check to. Defaults to the PR head (or the merge-queue group's
      head); the sweep passes the sibling PR's current head when re-posting.
  planning_repo:
    required: false
    default: .github
    description: >
      Repository (name only; owner is the workflow's org) where Epic issues live — read to
      check the Epic's `automation:paused` marker. Defaults to the org `.github` repo, where
      the planning Epics are tracked.
  kill_switch:
    required: false
    default: ""
    description: >
      Org-level HALT. The caller threads the org variable through as
      `kill_switch: vars.AGENT_KILL_SWITCH`, because a composite action cannot read the
      `vars` context itself. FAIL-SAFE semantics: the gate is RUNNING only when the value
      (lowercased, whitespace-stripped) is an explicit off-token — empty/unset, `0`, `off`, `false`,
      `no`, or `disabled`; ANYTHING ELSE engages the halt. A fat-fingered `halt` / `engage` / garbage
      value therefore HALTS (a kill-switch must fail TOWARD halting), and only an explicit off-token
      or an unset variable runs. When engaged the gate posts a `failure` HOLD on every PR (never a
      neutral/skip, which passes a required check open), so nothing merges org-wide until the switch
      is lifted. Read FIRST, before any membership work — the kill-switch is the hard, read-free halt
      (no token, no API), unlike the per-Epic `automation:paused` pause, which is BEST-EFFORT
      (fail-open on a label-read blip). Engaging the switch does NOT retroactively disarm native
      auto-merge already armed on an idle ready PR: merge-gate holds it (the required check goes red),
      but there is a brief latency window before the next event / reconcile sweep re-posts the hold.
  snapshot_dry_run:
    required: false
    default: "false"
    description: >
      When "true", log the capture decision and the payload that would be spliced into the Epic body,
      without editing the issue. Scoped to the snapshot write, which is the action's only mutation of
      state it does not own, and the only one that cannot be taken back — a frozen marker is the
      authority every reader acts on and is never rewritten. The `merge-gate` check-run is posted
      either way, because the gate is required and a pass that posted nothing would block every PR in
      the repo. Defaults to writing, since a rehearsing gate captures no snapshot and every Epic falls
      back to live label membership, losing the guarantee the snapshot exists to give.

runs:
  using: composite
  steps:
    # Mint an [Agent] token: checks:write to post the status, plus org-wide issues and
    # pull-requests read. The read stays org-wide because the `Closes` hint resolves a
    # closing issue's parent Epic, which lives in the org's planning repo; a repo-scoped
    # token resolves that parent to null and drops the "add the `epic:<N>` label"
    # nudge. Membership needs no cross-repo read here — the nested epic-membership action
    # mints its own org-wide token.
    - name: Mint token
      id: token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ github.repository_owner }}
        permission-checks: write
        permission-issues: read
        permission-pull-requests: read

    # Classify the PR as standalone, which posts success and exits, or as an Epic member,
    # which emits the Epic number for the resolve and evaluate steps. Standalone is decided
    # from the event payload's labels with no API call, so an ordinary PR survives a
    # GraphQL blip.
    - name: Classify PR (standalone vs Epic member)
      id: discover
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        REPO_FULL: ${{ github.repository_owner }}/${{ inputs.repo }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ inputs.repo }}
        PLANNING_REPO: ${{ inputs.planning_repo }}
        KILL_SWITCH: ${{ inputs.kill_switch }}
        HEAD_SHA: ${{ inputs.head_sha }}
        PR_NUMBER: ${{ inputs.pull_request_number }}
        IN_QUEUE: ${{ github.event.merge_group.head_sha }}
        MG_HEAD_REF: ${{ github.event.merge_group.head_ref }}
        # The triggering PR's labels from the event payload: the full set on a pull_request
        # event, empty on a merge_group or sweep run, which carry no pull_request payload.
        # The native pull_request path classifies from these with no API call.
        EVENT_PR: ${{ github.event.pull_request.number }}
        EVENT_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
      run: |
        set -euo pipefail

        # Anchor the check to the head the ruleset evaluates: the PR head on a
        # pull_request event, or the merge-queue group's head on a merge_group event.
        if [ -z "${HEAD_SHA:-}" ]; then
          echo "::error::merge-gate must run on a pull_request or merge_group event (no head SHA)."
          exit 1
        fi

        # Post the check-run as the App. jq builds the payload so a summary with quotes
        # or newlines cannot break the JSON.
        post_check() { # $1=conclusion  $2=summary
          jq -n --arg sha "$HEAD_SHA" --arg concl "$1" --arg summary "$2" \
            '{name: "merge-gate", head_sha: $sha, status: "completed", conclusion: $concl,
              output: {title: "merge-gate", summary: $summary}}' \
            | gh api "repos/${REPO_FULL}/check-runs" --method POST --input - >/dev/null
          echo "merge-gate=$1 @ ${HEAD_SHA:0:12} — $2" | tee -a "$GITHUB_STEP_SUMMARY"
        }

        # An empty value is terminal — this step already posted the check. A non-empty one
        # is the Epic number the resolve and evaluate steps gate against.
        emit() { echo "epic_number=$1" >> "$GITHUB_OUTPUT"; }

        # ---- Org-level halt: AGENT_KILL_SWITCH, read before any membership work -------------
        # The [Agent]'s emergency brake, and it fails toward halting: running only when the value,
        # lowercased and whitespace-stripped, is an explicit off-token — empty/unset, 0, off, false,
        # no, disabled — while any other value engages the halt. It arrives as an input because a
        # composite action cannot read the `vars` context, so the caller passes vars.AGENT_KILL_SWITCH
        # and the value resolves with no token and no API call before anything gates. A required-check
        # gate holds by posting `failure`, since a skipped check stays neutral and passes. The hold
        # also dequeues a live merge_group. It is posted before every success path — the standalone
        # fast-path, the misconfig branch, the merge_group re-affirm — because the org-wide halt rests
        # on merge-gate holding every PR.
        case "$(printf '%s' "${KILL_SWITCH:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          "" | 0 | off | false | no | disabled) : ;;  # explicit off-token / unset → running
          *)
            post_check failure "Automation halted org-wide by AGENT_KILL_SWITCH — holding this PR. Lift the org kill-switch (set it to an explicit off-token, e.g. \"off\", or unset it) to resume; the next event or reconcile sweep re-evaluates."
            emit ""
            exit 0
            ;;
        esac

        # planning_repo becomes an API path component in the Epic-pause read below, so require a bare
        # repo name: an owner slash, whitespace or an injected path redirects the request. It is
        # validated after the read-free kill-switch, so the halt wins even on a malformed value.
        if ! [[ "${PLANNING_REPO:-}" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::error::planning_repo must be a bare repository name (no owner/slash), got \"${PLANNING_REPO:-}\""
          exit 1
        fi

        # Is Epic N paused? Reads the `automation:paused` marker on the Epic issue in the planning
        # repo — a >= triage label, so a permission-gated per-Epic hold. Returns 0 = paused,
        # 1 = not paused, 2 = read error (the caller then falls through to normal readiness — fail-open
        # on pause, since pause is an operator convenience and the readiness gate still applies).
        epic_paused() { # $1 = epic number
          local out
          out=$(gh api "repos/${OWNER}/${PLANNING_REPO}/issues/$1" --jq '.labels[].name' 2>/dev/null) || return 2
          printf '%s\n' "$out" | grep -qx 'automation:paused'
        }

        # Read a PR's labels and its `Closes` parent, the discovery hint, in one query,
        # retrying transient GraphQL errors. Prints the response JSON on success; returns 1
        # and prints nothing after retries, leaving the caller to choose between holding and
        # passing. A null `pullRequest` — a valid-looking number that resolves to nothing,
        # such as a deleted PR or a merge_group ref naming a PR in another repo — comes back
        # with no GraphQL `.errors`, so it is guarded explicitly and treated as a fetch
        # failure; otherwise the later `.labels.nodes[]` aborts under `set -e`, leaving the
        # caller's explicit `failure` hold unposted and no check on the head at all.
        fetch_pr() { # $1=pr number
          local q data
          q='query($owner:String!,$repo:String!,$num:Int!){ repository(owner:$owner,name:$repo){
               pullRequest(number:$num){
                 labels(first:100){ nodes{ name } pageInfo{ hasNextPage } }
                 closingIssuesReferences(first:5){ nodes{ parent{ number } } } } } }'
          for attempt in 1 2 3; do
            if data=$(gh api graphql -f query="$q" -F owner="$OWNER" -F repo="$REPO" -F num="$1" 2>/dev/null) \
              && echo "$data" | jq -e 'has("data") and (has("errors") | not) and (.data.repository.pullRequest != null)' >/dev/null 2>&1; then
              printf '%s' "$data"
              return 0
            fi
            [ "$attempt" -lt 3 ] && sleep 2
          done
          return 1
        }

        # A head SHA with neither a PR nor a merge_group is a misconfigured caller, so fail
        # closed: a required check passed on a real SHA with nothing evaluated satisfies the
        # ruleset unchecked.
        if [ -z "${IN_QUEUE:-}" ] && [ -z "${PR_NUMBER:-}" ]; then
          post_check failure "No pull_request_number for ${HEAD_SHA:0:12} and not a merge_group event — refusing to pass a required check without evaluating a PR."
          emit ""
          exit 0
        fi

        # Identify the PR to classify. On a merge_group event the queued PR number is
        # encoded in the group ref (refs/heads/gh-readonly-queue/<base>/pr-<N>-<sha>); a
        # batch names one PR, and the gate evaluates that PR's Epic. Off the queue it is the
        # input PR number.
        if [ -n "${IN_QUEUE:-}" ]; then
          classify_pr=$(printf '%s' "${MG_HEAD_REF:-}" | grep -oE 'pr-[0-9]+' | head -n1 | grep -oE '[0-9]+' || true)
          if [ -z "$classify_pr" ]; then
            # The group ref does not identify the queued PR, so hold: a failing required
            # check dequeues the group, the sweep re-checks the PR head, and the PR returns
            # to the pool to re-enqueue.
            post_check failure "merge_group head_ref \"${MG_HEAD_REF:-}\" — couldn't identify the queued PR to re-check its Epic; holding (dequeues) rather than passing blind."
            emit ""
            exit 0
          fi
        else
          classify_pr="$PR_NUMBER"
        fi

        # Get this PR's labels, the authority, and its `Closes` parent, the hint. The native
        # pull_request event carries the labels in its payload, so the standalone fast path
        # classifies with no API call and a GraphQL outage cannot freeze it. The sweep and
        # merge_group paths have no PR payload and read the labels via the API; a read that
        # cannot complete holds.
        labels=""
        parent=""
        labels_truncated=false
        if [ -n "${EVENT_PR:-}" ] && [ "$classify_pr" = "${EVENT_PR}" ]; then
          labels=$(printf '%s' "${EVENT_LABELS:-[]}")
        else
          if data=$(fetch_pr "$classify_pr"); then
            labels=$(printf '%s' "$data" | jq -c '[.data.repository.pullRequest.labels.nodes[].name]')
            labels_truncated=$(printf '%s' "$data" | jq -r '.data.repository.pullRequest.labels.pageInfo.hasNextPage')
            parent=$(printf '%s' "$data" | jq -r '.data.repository.pullRequest.closingIssuesReferences.nodes[0].parent.number // empty')
          else
            post_check failure "Couldn't read PR #${classify_pr}'s labels (GraphQL error after retries) — holding rather than passing a required check blind; the reconcile sweep re-checks."
            emit ""
            exit 0
          fi
        fi

        # The `epic:<N>` label decides membership; the first match wins, one Epic per PR by
        # convention. A numeric-only match keeps the value safe for downstream use.
        epic=$(printf '%s' "$labels" | jq -r 'map(select(test("^epic:[0-9]+$")))[0] // empty' | grep -oE '[0-9]+' || true)

        # A truncated label page — a PR with more than 100 labels — with no epic:<N> in it
        # does not establish "standalone", so hold instead. Only the API path can truncate;
        # the native path reads the full label set from the event payload.
        if [ -z "$epic" ] && [ "$labels_truncated" = "true" ]; then
          post_check failure "PR #${classify_pr} has >100 labels; couldn't confirm it carries no \`epic:<N>\` label — holding rather than passing as standalone."
          emit ""
          exit 0
        fi

        if [ -n "$epic" ]; then
          # Per-Epic pause: `automation:paused` on the Epic issue holds its members by posting
          # failure, leaving every other Epic moving. Read first, so a paused Epic never resolves.
          ps=0; epic_paused "$epic" || ps=$?
          if [ "$ps" -eq 0 ]; then
            post_check failure "Epic #${epic} is automation:paused — holding its members. Remove the \`automation:paused\` label from Epic #${epic} to resume atomic landing."
            emit ""
            exit 0
          fi
          [ "$ps" -eq 2 ] && echo "::warning::couldn't read Epic #${epic} pause state (planning-repo read failed) — proceeding with normal readiness evaluation."
          # A labeled Epic member hands off to epic-membership, the authority, then evaluates.
          echo "PR #${classify_pr} carries \`epic:${epic}\` — resolving the authorized member set." | tee -a "$GITHUB_STEP_SUMMARY"
          emit "$epic"
          exit 0
        fi

        # No `epic:<N>` label means standalone, which always passes. The `Closes` walk is a
        # hint: when the closing issue has a parent Epic, suggest adding the label. The
        # native path skipped the API above, so the walk happens here, best-effort — a
        # failure drops the hint and the PR still passes.
        if [ -n "${EVENT_PR:-}" ] && [ "$classify_pr" = "${EVENT_PR}" ]; then
          if data=$(fetch_pr "$classify_pr"); then
            parent=$(printf '%s' "$data" | jq -r '.data.repository.pullRequest.closingIssuesReferences.nodes[0].parent.number // empty')
          fi
        fi

        if [ -n "$parent" ]; then
          post_check success "PR #${classify_pr} closes an issue under epic #${parent} but has no \`epic:${parent}\` label — treated as standalone. Add the \`epic:${parent}\` label to gate it for atomic cross-repo landing."
        else
          post_check success "PR #${classify_pr} has no \`epic:<N>\` label — standalone, nothing to coordinate."
        fi
        emit ""
        exit 0

    # Resolve the Epic's authorized member set: the open PRs carrying `epic:<N>`, org-wide.
    # The label is the membership authority, ahead of the author-controlled `Closes` walk.
    # The ref is pinned remotely because a `./` path resolves against the consumer repo's
    # workspace. continue-on-error keeps a resolve failure from aborting the composite; the
    # evaluate step turns an empty or failed resolve into a hold.
    - name: Resolve authorized member set
      id: membership
      if: ${{ steps.discover.outputs.epic_number != '' }}
      continue-on-error: true
      uses: a-novel-kit/workflows/generic-actions/epic-membership@v1.24.1
      with:
        epic_number: ${{ steps.discover.outputs.epic_number }}
        # Threaded through because this gate writes the snapshot to planning_repo below and this
        # step reads it back. On its own default the two target different repos as soon as a caller
        # overrides planning_repo, and the gate then gates on a set it never froze.
        planning_repo: ${{ inputs.planning_repo }}
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}

    # Recompute readiness over the member set and post the gate. Only the labeled-Epic path
    # reaches here; the classify step already posted the standalone, misconfig and hold cases.
    - name: Evaluate readiness + post merge-gate
      id: evaluate
      if: ${{ steps.discover.outputs.epic_number != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        REPO_FULL: ${{ github.repository_owner }}/${{ inputs.repo }}
        HEAD_SHA: ${{ inputs.head_sha }}
        EPIC: ${{ steps.discover.outputs.epic_number }}
        MEMBERS: ${{ steps.membership.outputs.members }}
        IN_QUEUE: ${{ github.event.merge_group.head_sha }}
        PR_NUMBER: ${{ inputs.pull_request_number }}
      run: |
        set -euo pipefail

        post_check() { # $1=conclusion  $2=summary
          jq -n --arg sha "$HEAD_SHA" --arg concl "$1" --arg summary "$2" \
            '{name: "merge-gate", head_sha: $sha, status: "completed", conclusion: $concl,
              output: {title: "merge-gate", summary: $summary}}' \
            | gh api "repos/${REPO_FULL}/check-runs" --method POST --input - >/dev/null
          echo "merge-gate=$1 @ ${HEAD_SHA:0:12} — $2" | tee -a "$GITHUB_STEP_SUMMARY"
        }

        where="on the PR head"
        [ -n "${IN_QUEUE:-}" ] && where="on the merge-queue group head"

        # epic-membership ran with continue-on-error, so an empty output means it failed to
        # resolve after its own retries, while a resolved-but-empty set is "[]". Neither
        # confirms readiness for a PR known to carry `epic:<N>`: it should appear in its own
        # set, so "[]" means the label search index is still lagging. Hold by posting
        # failure; the reconcile sweep re-runs and lands the set once ready.
        if [ -z "${MEMBERS:-}" ] || [ "${MEMBERS}" = "[]" ]; then
          post_check failure "Epic #${EPIC} — couldn't confirm the member set ${where} (resolve errored, or the label index is lagging); holding rather than passing on uncertainty. The reconcile sweep re-checks."
          exit 0
        fi

        # A member is merge-ready when it is non-draft and approved. Merged siblings have
        # already left the open set, since epic-membership returns open PRs only, so an
        # all-ready open set means the whole Epic is ready to land together. The same
        # recompute runs on a merge_group event against the group head: a member that
        # regressed since enqueue, back to draft or with its approval dismissed, makes the
        # set no longer all-ready and the `failure` below dequeues the group. A shrinking
        # set — a member closed unmerged — belongs to the partial-landing detector.
        # A PR carrying epic:<N> that is absent from the resolved set, labeled after the
        # snapshot froze or missed at capture, is held: it belongs to a later wave, and the
        # wave's verdict says nothing about its own readiness. Pre-snapshot the live set is
        # the PR's own set, so this is a no-op, and a
        # merge_group event gates the whole group.
        # This hold is also the only pass positioned to end the previous wave, so it enables the
        # capture step in retire-only mode before returning. Retirement needs a frozen wave that has
        # fully landed and a pass that reaches the capture step, and a wave with every member merged
        # has no open member left to run the gate. The pull request waiting here is the only trigger
        # there is.
        if [ -z "${IN_QUEUE:-}" ] && [ -n "${PR_NUMBER:-}" ]; then
          if [ "$(printf '%s' "$MEMBERS" | jq --arg r "$REPO_FULL" --argjson n "${PR_NUMBER}" \
                'any(.[]; .repo == $r and .number == $n)')" != "true" ]; then
            post_check failure "Epic #${EPIC} — this PR carries the label but is not in the member set ${where}; holding (it belongs to a later wave, not this landing)."
            echo "retire_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        # Readiness covers the still-open members. Under a snapshot the set is frozen and can carry
        # merged or closed members, which have left or abandoned the landing and belong to the
        # partial-landing detector. `state == null` tolerates an epic-membership version without
        # `state`, so a version skew degrades to the all-open live behavior.
        unready=$(printf '%s' "$MEMBERS" | jq -r '.[]
          | select(.state == "OPEN" or .state == null)
          | select(.isDraft or (.reviewDecision != "APPROVED"))
          | "  - \(.repo)#\(.number) (draft=\(.isDraft), review=\(.reviewDecision // "none"))"')

        total=$(printf '%s' "$MEMBERS" | jq '[.[] | select(.state == "OPEN" or .state == null)] | length')
        if [ -z "$unready" ]; then
          post_check success "Epic #${EPIC} — all ${total} open member(s) merge-ready ${where}. Atomic landing OK."
          # The set is approved and merge-ready, so trigger the two-phase capture below.
          echo "capture=true" >> "$GITHUB_OUTPUT"
        else
          count=$(printf '%s\n' "$unready" | grep -c '')
          post_check failure "$(printf 'Epic #%s — holding for atomic landing %s: %s of %s member(s) not ready:\n%s' \
            "$EPIC" "$where" "$count" "$total" "$unready")"
        fi

    # Activation snapshot: freeze the member set the first time the whole Epic is merge-ready, before
    # any member merges or is de-labeled. The issues:write token is separate and minimal, so the
    # gate's own token stays read-only on issues and the write capability lives in this step alone.
    - name: Mint snapshot-write token
      id: snap_token
      if: ${{ steps.evaluate.outputs.capture == 'true' || steps.evaluate.outputs.retire_only == 'true' }}
      # Best-effort with its capture step: a token-mint hiccup must not fail the gate.
      continue-on-error: true
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ github.repository_owner }}
        # Scoped to the planning repo. This token exists to edit one issue, and that issue is the
        # trust boundary the readers act on, so org-wide issues:write would let a bug here reach
        # every issue in the org.
        repositories: ${{ inputs.planning_repo }}
        # A rehearsal reads the Epic body and writes nothing, so it mints a read-only token. The
        # branch in the capture step already skips the write; withholding the capability makes a dry
        # run structurally unable to edit the issue rather than trusting that branch. GitHub compares
        # strings case-insensitively, so any casing of "true" reaches this.
        permission-issues: ${{ inputs.snapshot_dry_run == 'true' && 'read' || 'write' }}

    - name: Capture activation snapshot
      if: ${{ steps.evaluate.outputs.capture == 'true' || steps.evaluate.outputs.retire_only == 'true' }}
      # Best-effort: the merge-gate check is already posted success, so a failed capture never fails
      # the gate. Membership stays live-derived until the next ready pass writes the marker.
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ steps.snap_token.outputs.token }}
        ORG: ${{ github.repository_owner }}
        PLANNING_REPO: ${{ inputs.planning_repo }}
        EPIC: ${{ steps.discover.outputs.epic_number }}
        MEMBERS: ${{ steps.membership.outputs.members }}
        STABILIZE_SECONDS: "120"
        # Set when this pass arrived from the not-in-set hold. Such a pass is not a member of the set
        # it just read, so it has no standing to capture one; it may only retire the wave holding it.
        RETIRE_ONLY: ${{ steps.evaluate.outputs.retire_only }}
        SNAPSHOT_DRY_RUN: ${{ inputs.snapshot_dry_run }}
        # How long a frozen wave may sit unfinished before the gate names what it is waiting on. The
        # warning is the whole action: a snapshot that expired on a clock would un-freeze membership
        # mid-landing, which is the failure it exists to prevent. Resolution stays with a human, who
        # closes the stray or labels the Epic `automation:paused`.
        STUCK_WAVE_HOURS: "72"
      run: |
        set -euo pipefail
        # The marker currently in the body, as JSON; empty when there is none or it is unusable.
        current_marker() { # $1 = body
          printf '%s\n' "$1" \
            | awk -v s="$START" -v e="$END" '$0 == s {f=1;next} $0 == e {f=0} f' \
            | sed -n '/^[[:space:]]*[{[]/,$p' \
            | jq -s -c '.[0] // empty' 2>/dev/null || true
        }

        # The wave boundary a marker carries: the instant before which a terminal pull request belongs
        # to a retired wave. detect-partial-landing appends it to its `merged:` and `closed:` searches
        # so one wave's history is not read as the next one's.
        #
        # Extraction and validation live together here because callers both build payloads from this
        # value and compare writes against it. A second reading with a looser notion of well-formed
        # would never match this one, and the write would yield on every attempt. The accepted form is
        # the one this step emits, which is also the only form detect-partial-landing puts in a query,
        # so a hand-edited boundary drops out here and the next write replaces it. An absent boundary
        # scopes the next wave to unbounded history, which over-freezes; a bogus one reads as "nothing
        # landed" and clears.
        since_of() { # $1 = marker json -> the boundary, or empty
          printf '%s' "${1:-}" | jq -r '
            if type == "object" and (.since | type == "string")
              and (.since | test("\\A[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z\\z"))
            then .since else empty end' 2>/dev/null || true
        }

        START='<!-- epic-membership:snapshot:start -->'
        END='<!-- epic-membership:snapshot:end -->'

        # Two-phase capture, so the eventually-consistent label search never freezes an incomplete set:
        # an index-lagging member is why "all ready" can trip early on a short set. The first all-ready
        # pass writes a `pending` marker with a timestamp, and a later pass promotes it to `frozen`
        # once the set is unchanged and has aged past STABILIZE_SECONDS, giving the index time to
        # surface any missing member. A changed set resets the clock. epic-membership treats only
        # `frozen` as the set and reads `pending` as no snapshot. This runs per member PR, so several
        # passes reach here. GitHub stores bodies with CRLF; strip \r so the marker lines match.
        body=$(gh api "repos/${ORG}/${PLANNING_REPO}/issues/${EPIC}" --jq '.body // ""' | tr -d '\r')

        # Whether the frozen wave has fully landed. Only a merged member counts. A member de-labeled
        # and closed unmerged is what the snapshot exists to remember, so treating it as done would
        # retire the only record that the wave failed, and flip the partial-landing detector from
        # `frozen` to `clear`, which posts success. Such a wave stays frozen until a human resolves it
        # through epic-rollback.
        #
        # Under a frozen marker epic-membership returns that set with each member's state re-read
        # live, so this costs no extra call. Every state is OPEN before activation, and a version skew
        # omitting `state` yields false. Neither retires early.
        all_landed=$(printf '%s' "$MEMBERS" | jq -c \
          '(length > 0) and all(.[]; .state == "MERGED")' 2>/dev/null || echo false)

        # Repository names are canonicalized to lower case, so every pass computes a byte-identical
        # set for the same members. GitHub resolves names case-insensitively and answers with either
        # casing, and the decision reads a byte-different set as "members moved", resets the
        # stabilization clock, and the Epic never freezes. Lower case is safe to store: every lookup
        # built from it is case-insensitive, and both readers match members by alias index and number.
        # The normalization matches what the readers validate, so the writer cannot emit a marker they
        # reject: a frozen marker is never rewritten, so one they refuse is a permanently dead
        # snapshot that degrades every Epic to live membership. The 50-member cap matches theirs.
        cur=$(printf '%s' "$MEMBERS" | jq -c '
          [.[] | {repo: (.repo | ascii_downcase), number}]
          | unique_by(.repo, .number) | sort_by(.repo, .number)')
        if ! printf '%s' "$cur" | jq -e '
              length > 0 and length <= 50
              and all(.[]; (.repo | test("\\A[A-Za-z0-9][A-Za-z0-9-]*/[A-Za-z0-9._-]+\\z"))
                and (.number | type == "number" and . == floor and . > 0 and . < 2147483648))' >/dev/null 2>&1; then
          echo "::warning::Epic #${EPIC}: resolved member set is not snapshot-writable (empty, over 50 members, or malformed) — not capturing an activation snapshot this pass." \
            | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        # The fenced region holds a human-readable note and then the JSON, so skip to the first line
        # that opens a value before parsing. A frozen marker this fails to read falls to the `pending`
        # branch below, which overwrites it with the current live set, erasing the de-labeled member
        # the snapshot was frozen to remember. All three participants extract this way.
        marker=$(current_marker "$body")
        # An unparseable marker, such as hand-edited garbage, counts as absent and yields a fresh
        # pending, which self-heals the region.
        if [ -z "$marker" ] || ! printf '%s' "$marker" | jq empty 2>/dev/null; then marker=null; fi
        now=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        # The boundary this pass inherits. splice replaces the whole fenced region, so a boundary
        # survives only by being written again: the first capture after a retirement carries the
        # tombstone's instant forward, which keeps the retired wave's merges out of the new wave's
        # history.
        inherited_since=$(since_of "$marker")

        # A frozen marker is retired once its wave has landed, and otherwise skipped. A valid pending
        # one resets when the members changed, promotes when it is unchanged and aged, and otherwise
        # waits. Anything else — missing, malformed, or carrying another status, which includes a
        # `retired` tombstone — gets a fresh pending.
        do=$(jq -rn --argjson cur "$cur" --argjson mk "$marker" --arg now "$now" \
          --argjson landed "$all_landed" --argjson thr "${STABILIZE_SECONDS}" '
          if ($mk | type) != "object" then "pending"
          # A frozen wave whose members have all merged has discharged its purpose. Retiring it draws
          # the wave boundary and frees the next ready set to capture its own, which is the "joins the
          # next wave" behavior epic-membership documents. A marker left in place holds every pull
          # request labeled after it.
          elif $mk.status == "frozen" then (if $landed then "retire" else "skip" end)
          elif ($mk.status == "pending" and ($mk.members | type == "array") and ($mk.at | type == "string"))
            then (
              if (($mk.members | sort_by((.repo | ascii_downcase), .number)) != $cur) then "pending"
              # An unparseable `at` rewrites a fresh pending. Read as
              # epoch 0 a corrupt timestamp is infinitely old and promotes on the next pass, skipping
              # the stabilization window; read as "now" it never ages, and with the member set
              # unchanged the reset branch above never fires either, so the marker stalls and the Epic
              # keeps live membership. Rewriting refuses the premature freeze and repairs the marker.
              elif (($mk.at | try (fromdateiso8601 | true) catch false) | not) then "pending"
              elif (($now | fromdateiso8601) - ($mk.at | fromdateiso8601)) >= $thr then "frozen"
              else "skip" end)
          else "pending" end' 2>/dev/null || echo skip)

        if [ "$do" = "skip" ]; then
          # A frozen wave that cannot finish is otherwise invisible: it holds every pull request
          # labeled after it, retirement needs every member merged, and nothing says why. Name what it
          # is waiting on once the wait is long enough to be a fault. An open member is late; a member
          # closed unmerged means the wave did not land and never retires.
          if [ "$(printf '%s' "$marker" | jq -r 'if type == "object" then (.status // "") else "" end' 2>/dev/null || true)" = "frozen" ] \
            && printf '%s' "$marker" | jq -e --arg now "$now" --argjson hrs "${STUCK_WAVE_HOURS}" \
                 '(.at | try (fromdateiso8601 | true) catch false)
                  and (($now | fromdateiso8601) - (.at | fromdateiso8601)) >= ($hrs * 3600)' >/dev/null 2>&1; then
            late=$(printf '%s' "$MEMBERS" | jq -r '[.[] | select(.state == "OPEN" or .state == null)
              | "\(.repo)#\(.number)"] | join(", ")' 2>/dev/null || true)
            abandoned=$(printf '%s' "$MEMBERS" | jq -r '[.[] | select(.state == "CLOSED")
              | "\(.repo)#\(.number)"] | join(", ")' 2>/dev/null || true)
            if [ -n "$late" ]; then
              echo "::warning::Epic #${EPIC}: the frozen wave has been open more than ${STUCK_WAVE_HOURS}h, still waiting on ${late}. Nothing labeled after it can land until it finishes — land those, close them, or label the Epic \`automation:paused\`." \
                | tee -a "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$abandoned" ]; then
              echo "::warning::Epic #${EPIC}: the frozen wave cannot retire — ${abandoned} closed without merging, so it did not land. It stays frozen because the snapshot is the only record that those were members; resolve it with epic-rollback." \
                | tee -a "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "Epic #${EPIC}: snapshot already frozen, or stable but not yet aged — leaving it." \
            | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        # A retire-only pass reached here from the not-in-set hold, so it read a set it is not part
        # of. Capturing one would freeze a wave on the authority of a pull request that wave excludes.
        # It may end the previous wave and nothing else.
        if [ "${RETIRE_ONLY:-}" = "true" ] && [ "$do" != "retire" ]; then
          echo "Epic #${EPIC}: held for a later wave, and the current snapshot is not retirable this pass (${do}) — leaving it." \
            | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        if [ "$do" = "retire" ]; then
          # A tombstone. The marker is the only record of where this wave ended, and the live
          # `merged:` search keeps returning the wave's merges for the rest of the Epic's life, so an
          # empty region would hand the next wave the previous one's history back. `since` is `now`:
          # retirement draws the boundary, superseding whatever came before. Nothing merges between
          # the wave's last merge and this pass, because the gate holds every non-member, so the
          # boundary hides no history. The tombstone names no members, and both membership readers
          # select on `status == "frozen"`, so it resolves there as an absent marker does.
          payload=$(jq -cn --arg since "$now" '{status: "retired", since: $since}')
          note="_Epic membership, RETIRED — the wave frozen here has fully landed. The instant below separates its history from the next wave's; the next ready set captures its own. Do not edit._"
        elif [ "$do" = "frozen" ]; then
          # `at` records when the status last changed. A frozen marker never ages into another status;
          # the timestamp is there so a wave that cannot finish can be measured and reported.
          payload=$(printf '%s' "$cur" | jq -c --arg at "$now" --arg since "$inherited_since" \
            '{status: "frozen", at: $at, members: .} + (if $since == "" then {} else {since: $since} end)')
          note="_Epic membership, FROZEN at activation by the merge-gate. The authoritative set for this landing — a later de-label, close, or relabel does not change it. Do not edit._"
        else
          payload=$(printf '%s' "$cur" | jq -c --arg at "$now" --arg since "$inherited_since" \
            '{status: "pending", at: $at, members: .} + (if $since == "" then {} else {since: $since} end)')
          note="_Epic membership, PENDING — stabilizing before it freezes (the label index is eventually consistent). Do not edit._"
        fi

        # splice(): a hand-edit-safe marker writer, shared with render-epic-status. It replaces a
        # well-formed region in place, covering both the pending reset and the frozen promote;
        # otherwise it strips any stray marker lines and appends one fresh region. Human prose
        # survives either path.
        splice() { # $1 = body file, $2 = region file (already wrapped in the markers)
          local bodyf="$1" regionf="$2" ns ne sl el wellformed=false
          ns=$(grep -cxF -- "$START" "$bodyf" || true)
          ne=$(grep -cxF -- "$END" "$bodyf" || true)
          if [ "$ns" = "1" ] && [ "$ne" = "1" ]; then
            sl=$(grep -nxF -- "$START" "$bodyf" | cut -d: -f1)
            el=$(grep -nxF -- "$END" "$bodyf" | cut -d: -f1)
            if [ "$sl" -lt "$el" ]; then wellformed=true; fi
          fi
          if [ "$wellformed" = true ]; then
            awk -v startm="$START" -v endm="$END" -v regionfile="$regionf" '
              BEGIN { region=""; while ((getline line < regionfile) > 0) region = region line "\n" }
              $0 == startm { if (!done) { printf "%s", region; done=1 } inside=1; next }
              $0 == endm { inside=0; next }
              inside { next }
              { print }
            ' "$bodyf"
          else
            grep -vxF -e "$START" -e "$END" -- "$bodyf" || true
            printf '\n'
            cat "$regionf"
          fi
        }

        # The region write_marker splices in below.
        regionf=$(mktemp)
        {
          echo "$START"
          echo "$note"
          printf '%s\n' "$payload"
          echo "$END"
        } > "$regionf"

        # Read-modify-verify, written as a function so the test harness can extract it and drive it
        # against a stubbed gh. The sweep runs this gate as a matrix over every open member pull
        # request with no concurrency bound, and the read-model renderer edits the same body from
        # another job, so writers overlap by design. GitHub's issues API offers no conditional update
        # — a GET returns an ETag, PATCH accepts no If-Match — so the guarantee is built from reads:
        # splice into a body read moments ago, then confirm the write survived, and a losing writer
        # retries against whatever landed.
        #
        # Re-reading alone is not enough: the decision ($do / $payload) was computed from a body
        # fetched earlier, and a peer may have moved the set since. A writer that re-reads without
        # re-deriving freezes a member set the world has already moved past, and the retry below makes
        # it win. So each attempt re-checks the decision against what is actually there.

        # The marker says what we intend and can still make progress: same status, same member set,
        # same wave boundary. `at` is per-writer and ignored, since under byte equality two writers
        # with an identical set never satisfy each other and both give up on a failure that never
        # happened. `since` is inherited content, so it counts toward equality. Both the entry
        # short-circuit and the post-write verify call this, so a repair that was clobbered cannot
        # read as a repair that landed.
        marker_settled() { # $1 = live marker json, $2 = our payload json
          same_marker "$1" "$2" || return 1
          # Only `pending` ages. `frozen` and `retired` are terminal states carrying no aging clock,
          # so equality is the whole test for them. A tombstone has no `at` to parse, and demanding
          # one leaves it permanently unsettled while the retirement retries to exhaustion.
          case "$(printf '%s' "$1" | jq -r '.status // ""' 2>/dev/null || true)" in
            frozen | retired) return 0 ;;
          esac
          # A pending marker whose `at` cannot be parsed can never age, so it is not settled however
          # equal its members look; the decision step routes that case to a repairing write.
          printf '%s' "$1" | jq -e '.at | try (fromdateiso8601 | true) catch false' >/dev/null 2>&1
        }

        same_marker() { # $1 = marker json, $2 = marker json
          [ -n "$1" ] && [ -n "$2" ] \
            && jq -e -n --argjson a "$1" --argjson b "$2" \
              '($a.status == $b.status) and (($a.members // []) == ($b.members // []))' >/dev/null 2>&1 \
            && [ "$(since_of "$1")" = "$(since_of "$2")" ]
        }

        write_marker() { # $1 = region file. 0 = our marker is in place, 2 = yielded, 1 = gave up
          local regionf="$1" bodyf outf attempt body marker err rc=1
          bodyf=$(mktemp); outf=$(mktemp)
          for attempt in 1 2 3; do
            # Re-read every attempt, the first included.
            if ! body=$(gh api "repos/${ORG}/${PLANNING_REPO}/issues/${EPIC}" --jq '.body // ""' 2>/dev/null | tr -d '\r'); then
              # Record it: a read failure has no diagnostic of its own, and `err` survives the
              # attempt so the give-up message is populated when the last attempts fail here.
              err="could not read ${ORG}/${PLANNING_REPO}#${EPIC} (attempt ${attempt})"
              [ "$attempt" -lt 3 ] && sleep 2
              continue
            fi
            marker=$(current_marker "$body")

            # The body already carries this pass's payload, so nothing needs writing. A `pending`
            # marker whose `at` does not parse is not equivalent, however close its members look: the
            # decision step routes that case here to repair it, since a timestamp that cannot be read
            # never ages and leaves the marker pending while every sweep logs success.
            if marker_settled "$marker" "$payload"; then
              rc=0
              break
            fi

            if [ "$do" = "retire" ]; then
              # Re-derive the retirement: only the frozen set this pass judged landed may be ended. A
              # marker that is no longer frozen, or whose members moved, means a peer has opened the
              # next wave, and a tombstone written now would discard it and redraw the boundary at the
              # wrong instant. The member comparison is character-for-character the one the freeze
              # guard below makes, so neither guard can accept what the other rejects.
              if ! jq -e -n --argjson m "${marker:-null}" --argjson cur "$cur" \
                   '($m | type == "object") and $m.status == "frozen"
                    and (($m.members // []) | sort_by((.repo | ascii_downcase), .number)) == $cur' >/dev/null 2>&1; then
                echo "Epic #${EPIC}: the snapshot moved on before this pass could retire it — leaving it." \
                  | tee -a "$GITHUB_STEP_SUMMARY"
                rc=2
                break
              fi
            # A frozen marker is terminal: it is the authority every reader has been using, so yield
            # whatever this pass intended. The check narrows the window without closing it — a freeze
            # landing between here and the write below is still clobbered, and no conditional-update
            # API exists to prevent that.
            elif [ -n "$marker" ] && [ "$(printf '%s' "$marker" | jq -r '.status // ""')" = "frozen" ]; then
              echo "Epic #${EPIC}: the snapshot is already frozen (a peer got there first) — leaving it." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              rc=2
              break
            fi

            # The payload took its boundary from the marker this pass read at the start, so a peer
            # that has since drawn a different one must survive. Retirement is exempt: it draws the
            # boundary, and the re-derive above already pins which set it may end. Both sides read
            # through since_of, so a corrupt boundary compares equal to the empty one replacing it and
            # the repairing write goes through.
            if [ "$do" != "retire" ] && [ "$(since_of "$marker")" != "${inherited_since:-}" ]; then
              echo "Epic #${EPIC}: the wave boundary moved while this pass was deciding — not overwriting it; the next pass inherits what is actually there." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              rc=2
              break
            fi

            # Re-derive the freeze. `do=frozen` means the set has held still long enough, judged
            # against the marker this pass read at the start. If a peer has since seen the set change
            # and reset the clock, that judgment is stale and a freeze on it makes a wrong set
            # permanent. Age is re-checked too: without it a freeze lands seconds after a peer's
            # reset, skipping the window that lets the lagging label index surface a missing member.
            # Abandon, and the next pass decides on current truth.
            if [ "$do" = "frozen" ] \
              && ! jq -e -n --argjson m "${marker:-null}" --argjson cur "$cur" \
                   --arg now "$now" --argjson thr "${STABILIZE_SECONDS}" \
                   '($m | type == "object") and $m.status == "pending"
                    and (($m.members // []) | sort_by((.repo | ascii_downcase), .number)) == $cur
                    and ($m.at | try (fromdateiso8601 | true) catch false)
                    and (($now | fromdateiso8601) - ($m.at | fromdateiso8601)) >= $thr' >/dev/null 2>&1; then
              echo "::warning::Epic #${EPIC}: the member set moved while this pass was deciding — not freezing a stale set; the next pass re-derives." \
                | tee -a "$GITHUB_STEP_SUMMARY"
              rc=2
              break
            fi

            printf '%s' "$body" > "$bodyf"
            splice "$bodyf" "$regionf" > "$outf"
            err=$(gh issue edit "$EPIC" --repo "${ORG}/${PLANNING_REPO}" --body-file "$outf" 2>&1 >/dev/null) || true
            # Verify the result: a peer write can land after ours and the edit's exit code says
            # nothing about that. The comparison is semantic and scoped to the region, so an orphaned
            # payload line that splice's recovery path leaves behind as prose does not match.
            if body=$(gh api "repos/${ORG}/${PLANNING_REPO}/issues/${EPIC}" --jq '.body // ""' 2>/dev/null | tr -d '\r') \
              && marker_settled "$(current_marker "$body")" "$payload"; then
              rc=0
              break
            fi
            [ "$attempt" -lt 3 ] && sleep 2
          done
          if [ "$rc" = 1 ] && [ -n "${err:-}" ]; then
            echo "::warning::Epic #${EPIC}: last write error — ${err}"
          fi
          rm -f "$bodyf" "$outf"
          return "$rc"
        }

        # A rehearsal stops here. Everything above is reads and pure computation, so the decision, the
        # set it rests on and the byte-exact payload are all known, and the next call is the write.
        # Naming the members is the point: a capture is judged by whether the right set is in it, and
        # a frozen marker is the authority every reader acts on from then on.
        if [ "$(printf '%s' "${SNAPSHOT_DRY_RUN:-false}" | tr '[:upper:]' '[:lower:]')" = "true" ]; then
          {
            echo "Epic #${EPIC}: dry run — would write a \"${do}\" activation snapshot. The Epic body is untouched, so a repeated pass reports this same transition."
            echo "  set judged ($(printf '%s' "$cur" | jq 'length') member(s)):"
            printf '%s' "$cur" | jq -r '.[] | "    \(.repo)#\(.number)"'
            echo "  payload: ${payload}"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        write_marker "$regionf" && wm=0 || wm=$?
        if [ "$wm" = 0 ] && [ "$do" = "retire" ]; then
          echo "Epic #${EPIC}: the wave landed — activation snapshot retired at ${now}; the next ready set captures its own." \
            | tee -a "$GITHUB_STEP_SUMMARY"
        elif [ "$wm" = 0 ]; then
          n=$(printf '%s' "$cur" | jq 'length')
          echo "Epic #${EPIC}: ${do} activation snapshot in place — ${n} member(s)." | tee -a "$GITHUB_STEP_SUMMARY"
        elif [ "$wm" = 2 ]; then
          : # yielded deliberately; write_marker already said why
        else
          echo "::warning::Epic #${EPIC}: could not write the ${do} activation snapshot after 3 attempts; membership stays live-derived."
        fi
