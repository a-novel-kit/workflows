name: board-write
description: >
  The write half of the board automation: set one field (single-select or date) on a
  Projects v2 board item, for a given issue or PR, as the [Agent] App. It resolves the
  field + option node-ids and the item — adding the item to the board if it isn't a
  member yet — and compares the current value before writing, so a re-run or an
  overlapping trigger is a no-op rather than a redundant mutation. This is the single
  privileged path that mutates the board; the status deriver and the rollup engine
  both go through it, which is what keeps the board single-writer.

inputs:
  client_id:
    required: true
    description: >
      Client id for the org's [Agent] bot. The default GITHUB_TOKEN cannot see
      org-level Projects v2, so a bot token is required.
  app_private_key:
    required: true
    description: The [Agent] bot App private key (PEM) — the AGENT_BOT_PRIVATE_KEY org secret.
  project_id:
    required: true
    description: >
      Node id of the org "Tasks" board (PVT_…). Passed in per-org by the caller — the
      same way client_id is — so the action needs no title lookup. Find it with:
      gh project view <n> --owner <org> --format json.
  content_id:
    required: true
    description: >
      Node id of the issue or PR whose board item to write, or several such ids separated
      by newlines or spaces. The caller resolves what to write (e.g. a PR's linked
      issues); board-write finds each content's item in the project and applies the same
      field and value to all of them. Several ids belong here because a composite action
      cannot loop a `uses:` step, which leaves this the only place the fan-out can happen
      without a second implementation of the write.
  field:
    required: true
    description: Name of the field to set, e.g. "Status" or "Start date".
  value:
    required: true
    description: >
      Target value. For a single-select field, the option name (e.g. "In progress").
      For a date field, an ISO date (YYYY-MM-DD).
  add_if_missing:
    required: false
    default: "true"
    description: >
      When "true" (default), add content to the board if it isn't a member yet, so a
      derived write can't silently no-op on an un-boarded item. "false" errors instead.
  only_if_empty:
    required: false
    default: "false"
    description: >
      When "true", write only if the field is currently empty; a field that already
      holds any value is left untouched. Use it for set-once fields like Start date, so
      a re-run or the reconcile sweep can't overwrite the original stamp.
  dry_run:
    required: false
    default: "false"
    description: When "true", log the change that would be made without writing it.
  kill_switch:
    required: false
    default: ""
    description: >
      Org-level HALT, threaded from the caller as `kill_switch: vars.AGENT_KILL_SWITCH`
      (a composite action cannot read the `vars` context itself). FAIL-SAFE: RUNNING only when the
      value (lowercased, whitespace-stripped) is an explicit off-token — empty/unset, 0, off, false,
      no, disabled; ANYTHING ELSE (a fat-fingered value or garbage) engages the halt. When engaged
      this single board writer no-ops (no mutation, changed=false) and exits 0 — read FIRST, before
      any write (the guard and the write share one step, so the exit is sufficient here).

outputs:
  item_id:
    description: >
      Node id of the board item that was resolved (or added). With several content ids, the
      last one; the outputs describe the run rather than one item.
    value: ${{ steps.write.outputs.item_id }}
  changed:
    description: '"true" if any item was mutated, "false" if every one already held the value.'
    value: ${{ steps.write.outputs.changed }}

runs:
  using: composite
  steps:
    # Mint a token scoped to the org's Projects v2 alone, which bounds a leak of
    # this step's token to board edits.
    - name: Mint org-Projects token
      id: token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ github.repository_owner }}
        permission-organization-projects: write

    - name: Write the field
      id: write
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        PROJECT_ID: ${{ inputs.project_id }}
        CONTENT_ID: ${{ inputs.content_id }}
        FIELD: ${{ inputs.field }}
        VALUE: ${{ inputs.value }}
        ADD_IF_MISSING: ${{ inputs.add_if_missing }}
        ONLY_IF_EMPTY: ${{ inputs.only_if_empty }}
        DRY_RUN: ${{ inputs.dry_run }}
        KILL_SWITCH: ${{ inputs.kill_switch }}
      run: |
        set -euo pipefail

        # Org-level halt, read before the write. Fail-safe: running only for an explicit off-token
        # (empty/unset, 0, off, false, no, disabled); any other value engages the halt. This is the
        # single privileged board mutator, and its guard and mutation share one step, so the `exit 0`
        # here stops every derived board write (no mutation, changed=false) while the org is halted.
        case "$(printf '%s' "${KILL_SWITCH:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          "" | 0 | off | false | no | disabled) : ;;  # explicit off-token / unset → running
          *)
            echo "AGENT_KILL_SWITCH engaged — skipping board write for \"${FIELD}\" on ${CONTENT_ID} (org-wide halt)." | tee -a "$GITHUB_STEP_SUMMARY"
            {
              echo "item_id="
              echo "changed=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac

        for v in PROJECT_ID CONTENT_ID FIELD VALUE; do
          if [ -z "${!v:-}" ]; then
            echo "::error::$v is required"
            exit 1
          fi
        done

        # 1. Resolve the field on this board: its node id, type, and — for a
        #    single-select — the option node-ids. A single-select field satisfies both
        #    ProjectV2FieldCommon (id, dataType) and ProjectV2SingleSelectField
        #    (options); a date field is a plain ProjectV2Field.
        field_q='query($proj:ID!,$field:String!){ node(id:$proj){ ... on ProjectV2{
          field(name:$field){
            ... on ProjectV2FieldCommon{ id dataType }
            ... on ProjectV2SingleSelectField{ options{ id name } } } } } }'
        fresp=$(gh api graphql -f query="$field_q" -F proj="$PROJECT_ID" -F field="$FIELD")
        field_id=$(echo "$fresp" | jq -r '.data.node.field.id // empty')
        data_type=$(echo "$fresp" | jq -r '.data.node.field.dataType // empty')
        if [ -z "$field_id" ]; then
          echo "::error::field \"$FIELD\" not found on the board"
          exit 1
        fi

        # Build the GraphQL value fragment to write, and the sub-selection that reads
        # the item's current value for the compare-before-write. Both inlined values are
        # safe to interpolate: a single-select option id is a GitHub node id, and a date
        # is format-checked below.
        case "$data_type" in
          SINGLE_SELECT)
            opt_id=$(echo "$fresp" | jq -r --arg v "$VALUE" \
              '.data.node.field.options[] | select(.name==$v) | .id')
            if [ -z "$opt_id" ]; then
              echo "::error::\"$VALUE\" is not an option of single-select field \"$FIELD\""
              exit 1
            fi
            value_frag="{singleSelectOptionId: \"$opt_id\"}"
            cur_frag='... on ProjectV2ItemFieldSingleSelectValue{ current: name }'
            ;;
          DATE)
            if ! echo "$VALUE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "::error::date field \"$FIELD\" needs a YYYY-MM-DD value, got \"$VALUE\""
              exit 1
            fi
            # Reject a well-formed but impossible date (2026-02-30, say) with a clear
            # message. A real date round-trips through `date -d`; a bad one errors or
            # normalizes to a different day.
            if [ "$(date -d "$VALUE" +%Y-%m-%d 2>/dev/null)" != "$VALUE" ]; then
              echo "::error::\"$VALUE\" is not a real calendar date"
              exit 1
            fi
            value_frag="{date: \"$VALUE\"}"
            cur_frag='... on ProjectV2ItemFieldDateValue{ current: date }'
            ;;
          *)
            echo "::error::board-write handles single-select + date fields; \"$FIELD\" is $data_type"
            exit 1
            ;;
        esac

        # content_id may name several contents, newline- or space-separated: a pull request can close
        # more than one issue. The loop lives here because a composite action cannot loop a `uses:`
        # step, leaving this the single path that mutates the board.
        read -r -a content_ids <<<"$(printf '%s' "$CONTENT_ID" | tr '\n' ' ')"

        any_changed=false
        last_item=""

        for content_id in "${content_ids[@]}"; do
          [ -n "$content_id" ] || continue

          # 2. Resolve the content's item in this project, adding it if missing so a derived
          #    write on an un-boarded Task boards it. Page through projectItems so a content
          #    sitting on many projects still matches when the target board is not on the
          #    first page.
          item_q='query($c:ID!,$cursor:String){ node(id:$c){
            ... on Issue{ projectItems(first:100, after:$cursor){
              pageInfo{ hasNextPage endCursor } nodes{ id project{ id } } } }
            ... on PullRequest{ projectItems(first:100, after:$cursor){
              pageInfo{ hasNextPage endCursor } nodes{ id project{ id } } } } } }'
          item_id=""
          cursor=""
          while :; do
            args=(-F c="$content_id")
            [ -n "$cursor" ] && args+=(-F cursor="$cursor")
            iresp=$(gh api graphql -f query="$item_q" "${args[@]}")
            item_id=$(echo "$iresp" | jq -r --arg p "$PROJECT_ID" \
              '[.data.node.projectItems.nodes[] | select(.project.id==$p) | .id][0] // empty')
            [ -n "$item_id" ] && break
            [ "$(echo "$iresp" | jq -r '.data.node.projectItems.pageInfo.hasNextPage')" = "true" ] || break
            cursor=$(echo "$iresp" | jq -r '.data.node.projectItems.pageInfo.endCursor')
          done

          if [ -z "$item_id" ]; then
            if [ "$ADD_IF_MISSING" != "true" ]; then
              echo "::error::content $content_id is not on the board and add_if_missing=false"
              exit 1
            fi
            add_m='mutation($proj:ID!,$c:ID!){
              addProjectV2ItemById(input:{projectId:$proj,contentId:$c}){ item{ id } } }'
            item_id=$(gh api graphql -f query="$add_m" -F proj="$PROJECT_ID" -F c="$content_id" \
              | jq -r '.data.addProjectV2ItemById.item.id')
            echo "Added content to the board (item $item_id)." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

          last_item="$item_id"

          # 3. Compare-before-write: read the item's current value for this field. An equal
          #    value means a re-run or an overlapping trigger, so nothing is mutated.
          cur_q="query(\$item:ID!,\$field:String!){ node(id:\$item){ ... on ProjectV2Item{
            fieldValueByName(name:\$field){ $cur_frag } } } }"
          cur=$(gh api graphql -f query="$cur_q" -F item="$item_id" -F field="$FIELD" \
            | jq -r '.data.node.fieldValueByName.current // empty')

          # A set-once field such as Start date keeps whatever it already holds, so a re-run
          # or the sweep cannot overwrite the original stamp.
          if [ "$ONLY_IF_EMPTY" = "true" ] && [ -n "$cur" ]; then
            echo "No change — \"$FIELD\" already set (\"$cur\") on item $item_id and only_if_empty." | tee -a "$GITHUB_STEP_SUMMARY"
            continue
          fi

          if [ "$cur" = "$VALUE" ]; then
            echo "No change — \"$FIELD\" already \"$VALUE\" on item $item_id." | tee -a "$GITHUB_STEP_SUMMARY"
            continue
          fi

          # 4. Write it (or, under dry-run, just report).
          if [ "$DRY_RUN" = "true" ]; then
            echo "- [dry-run] would set \"$FIELD\" = \"$VALUE\" on item $item_id (was \"${cur:-<unset>}\")." \
              | tee -a "$GITHUB_STEP_SUMMARY"
            continue
          fi

          write_m="mutation(\$proj:ID!,\$item:ID!,\$field:ID!){ updateProjectV2ItemFieldValue(input:{
            projectId:\$proj, itemId:\$item, fieldId:\$field, value: $value_frag }){ projectV2Item{ id } } }"
          gh api graphql -f query="$write_m" -F proj="$PROJECT_ID" -F item="$item_id" -F field="$field_id" >/dev/null
          echo "Set \"$FIELD\" = \"$VALUE\" on item $item_id (was \"${cur:-<unset>}\")." | tee -a "$GITHUB_STEP_SUMMARY"
          any_changed=true
        done

        {
          echo "item_id=$last_item"
          echo "changed=$any_changed"
        } >> "$GITHUB_OUTPUT"
