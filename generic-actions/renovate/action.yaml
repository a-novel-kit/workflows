name: self-hosted renovate
description: Run a self-hosted Renovate pass against the repository, authenticated as the bot.

inputs:
  allowed_commands:
    required: false
    description: Specify allowed commands for renovate post update actions.
  github_token:
    required: true
    description: The GitHub token to use for the action.
  app_private_key:
    required: true
    description: The GitHub App private key.
  client_id:
    required: false
    description: GitHub App client id (recommended).

runs:
  using: "composite"
  steps:
    - uses: a-novel-kit/workflows/generic-actions/pull-bot@v1.24.1
      id: app_token
      with:
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}
    - name: self-hosted renovate
      uses: renovatebot/github-action@v46.1.20
      with:
        token: ${{ steps.app_token.outputs.token }}
        docker-network: ${{ job.container.network }}
      env:
        # postUpgradeTasks cannot install private npm packages. Running the full install from
        # the main renovate process, which holds the right token, leaves every node module
        # in place before those tasks run.
        RENOVATE_SKIP_INSTALLS: false
        # A tight pnpm allowlist by default — install, format, dedupe — so postUpgradeTasks run
        # without permitting arbitrary `pnpm exec` or `pnpm dlx`. The `( |$)` suffix matches the
        # command with arguments or on its own, such as a bare `pnpm i`. The default also covers a
        # caller passing an empty `allowed_commands`, where the tasks are skipped and leave an
        # unformatted pnpm-workspace.yaml and stale lockfiles. Callers can still override it.
        RENOVATE_ALLOWED_COMMANDS: ${{ inputs.allowed_commands || '["^pnpm (install|i|format|dedupe)( |$)"]' }}
        RENOVATE_REPOSITORIES: "['${{ github.repository }}']"
        RENOVATE_PR_HOURLY_LIMIT: 0
        LOG_LEVEL: debug
        RENOVATE_SECRETS: '{"GITHUB_TOKEN": "${{ inputs.github_token }}"}'
        # Fetch public dependencies through the CDN-backed module proxy, falling back to
        # direct only when the proxy cannot serve a version. Resolving every dependency from
        # origin makes `go mod tidy` fail intermittently on vanity-import hosts — gonum.org
        # resets the connection mid-fetch — which aborts the tidy and leaves go.sum
        # un-regenerated after a go.mod bump. GOPRIVATE keeps the a-novel and a-novel-kit
        # modules off the proxy and sumdb, so a freshly tagged internal version is fetched
        # straight from GitHub without waiting for proxy.golang.org to index it.
        RENOVATE_CUSTOM_ENV_VARIABLES: |
          {
            "GITHUB_TOKEN": "'{{ secrets.GITHUB_TOKEN }}'",
            "GOPROXY": "https://proxy.golang.org,direct",
            "GOPRIVATE": "github.com/a-novel,github.com/a-novel-kit"
          }
        RENOVATE_ALLOW_SCRIPTS: true
        RENOVATE_ASSIGN_AUTOMERGE: true
        RENOVATE_ASSIGNEES_FROM_CODE_OWNERS: true
        RENOVATE_LABELS: "['dependencies', 'renovate']"
        # TODO: two temporary allowedVersions holds below — drop each once its condition clears
        # (see the rule descriptions). Tracked in https://github.com/a-novel-kit/workflows/issues/308
        RENOVATE_PACKAGE_RULES: |
          [
            {
              "description": "Automerge everything except major updates",
              "matchUpdateTypes": ["minor", "patch", "pin", "digest", "lockFileMaintenance"],
              "automerge": true
            },
            {
              "description": "Hold pnpm off 11.12.0: that release regressed pnpm's own global self-installer (createFullPkgId throws 'Cannot use in operator to search for integrity in undefined'), so pnpm/action-setup crashes during CI setup the moment a repo bumps its packageManager field to it. The range allows every other version, so Renovate resumes bumping as soon as a fixed patch (11.12.1+) ships — drop this rule then.",
              "matchPackageNames": ["pnpm"],
              "allowedVersions": "<11.12.0 || >11.12.0"
            },
            {
              "description": "Hold TypeScript on the v6 line until the toolchain supports the v7 native-compiler rewrite. TS7 removes JS-API surface prettier's .ts-config loader relies on (it reads an undefined ModuleKind member and throws), and typescript-eslint still caps its peer range at typescript <6.1.0, so a frozen-lockfile install fails on the unmet peer. Drop this rule once typescript-eslint's peer range admits v7.",
              "matchPackageNames": ["typescript"],
              "allowedVersions": "<7"
            },
            {
              "description": "Match pnpm's minimumReleaseAge supply-chain gate, scoped to the npm manager (which is what Renovate uses for pnpm: pnpm-lock.yaml, workspaces, catalogs) so it doesn't open/rebase PRs for packages too fresh to pass pnpm install. Other ecosystems (gomod, docker, github-actions) aren't gated by pnpm, so they keep landing security patches without delay. Keep >= pnpm's value (defined in nodelib-config).",
              "matchManagers": ["npm"],
              "minimumReleaseAge": "3 days"
            },
            {
              "description": "Bump the go directive, grouped with the golang base image",
              "matchManagers": ["gomod"],
              "matchDepNames": ["go"],
              "matchDepTypes": ["golang"],
              "rangeStrategy": "bump",
              "groupName": "go toolchain"
            },
            {
              "description": "Keep the golang base image in the same PR as the go directive",
              "matchManagers": ["dockerfile", "docker-compose"],
              "matchDepNames": ["docker.io/library/golang"],
              "groupName": "go toolchain"
            },
            {
              "matchPackageNames": ["/.*a-novel-kit\\/nodelib.*/"],
              "groupName": "nodelib"
            },
            {
              "description": "Group every a-novel-kit/workflows action together — the composite actions are one repo released as a unit, so consumers must bump all their pinned refs at once.",
              "matchPackageNames": ["/.*a-novel-kit\\/workflows.*/"],
              "groupName": "a-novel-kit workflows"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-json-keys.*/"],
              "groupName": "service json keys"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-authentication.*/"],
              "groupName": "service authentication"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-narrative-engine.*/"],
              "groupName": "service narrative engine"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/platform-authentication.*/"],
              "groupName": "platform authentication"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/platform-narrative-engine.*/"],
              "groupName": "platform narrative engine"
            },
            {
              "matchPackageNames": ["/.*github.com\\/uptrace\\/bun.*/"],
              "groupName": "uptrace/bun"
            },
            {
              "matchPackageNames": ["/.playwright.*/"],
              "groupName": "playwright"
            },
            {
              "description": "Consolidate non-major npm updates into one PR per repo. They all edit the shared pnpm-lock.yaml, so as separate PRs they conflict pairwise and the merge queue can only land one per cycle. This rule is last so it supersedes the per-name/monorepo groups for non-major npm updates; major npm updates keep their named groups and individual review.",
              "matchManagers": ["npm"],
              "matchUpdateTypes": ["minor", "patch", "pin", "digest", "lockFileMaintenance"],
              "groupName": "javascript dependencies"
            },
            {
              "description": "Leave pnpm audit-managed overrides to the audit action. node-actions/audit runs `pnpm audit --fix=override` daily and pins vulnerable transitive dependencies to the minimal patched version within each consumer's supported range. Renovate's npm manager otherwise re-reads the override value as an ordinary dependency and bumps it to the latest major, pushing the pin past the parent's compatibility ceiling (e.g. undici v8 breaks jsdom's private wrap-handler.js deep-import). Audit owns these values; Renovate must not touch them. All three depTypes must stay listed: Renovate types package.json `pnpm.overrides` and its `overrides` alias, but overrides declared in pnpm-workspace.yaml (pnpm 10's preferred location) get `pnpm-workspace.overrides` — omit it and the guard silently no-ops for every workspace-level override.",
              "matchDepTypes": ["pnpm.overrides", "overrides", "pnpm-workspace.overrides"],
              "enabled": false
            }
          ]
        # Authenticate npm installs against the private GitHub Packages registry.
        RENOVATE_DETECT_HOST_RULES_FROM_ENV: true
        RENOVATE_NPM_NPM_PKG_GITHUB_COM_TOKEN: ${{ inputs.github_token }}
