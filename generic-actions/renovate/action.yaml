name: self-hosted renovate

inputs:
  allowed_commands:
    required: false
    description: Specify allowed commands for renovate post update actions.
  github_token:
    required: true
    description: The GitHub token to use for the action.
  app_private_key:
    required: true
    description: The Github App private key.
  app_id:
    required: true
    description: The Github App ID.

runs:
  using: "composite"
  steps:
    - uses: a-novel-kit/workflows/generic-actions/pull-bot@master
      id: app_token
      with:
        app_id: ${{ inputs.app_id }}
        app_private_key: ${{ inputs.app_private_key }}
    - name: self-hosted renovate
      uses: renovatebot/github-action@v46.1.14
      with:
        token: ${{ steps.app_token.outputs.token }}
        docker-network: ${{ job.container.network }}
      env:
        # npm post upgrade tasks require the installation of private npm packages, which is
        # not supported in postUpgradeTasks. This forces the renovate process to run full
        # installation from the main process (which has access to the correct token), so
        # all the node modules are available to the post upgrade tasks.
        RENOVATE_SKIP_INSTALLS: false
        # Default to a tight pnpm allowlist (install / format / dedupe) so the postUpgradeTasks
        # run without permitting arbitrary `pnpm exec` / `pnpm dlx`. The `( |$)` suffix matches
        # the command followed by args OR on its own (e.g. bare `pnpm i`). Callers that pass an
        # empty `allowed_commands` would otherwise silently skip the tasks, leaving unformatted
        # pnpm-workspace.yaml and stale lockfiles. Callers can still override.
        RENOVATE_ALLOWED_COMMANDS: ${{ inputs.allowed_commands || '["^pnpm (install|i|format|dedupe)( |$)"]' }}
        RENOVATE_REPOSITORIES: "['${{ github.repository }}']"
        RENOVATE_PR_HOURLY_LIMIT: 0
        LOG_LEVEL: debug
        RENOVATE_SECRETS: '{"GITHUB_TOKEN": "${{ inputs.github_token }}"}'
        RENOVATE_CUSTOM_ENV_VARIABLES: |
          {
            "GITHUB_TOKEN": "'{{ secrets.GITHUB_TOKEN }}'",
            "GOPROXY": "direct"
          }
        RENOVATE_ALLOW_SCRIPTS: true
        RENOVATE_ASSIGN_AUTOMERGE: true
        RENOVATE_ASSIGNEES_FROM_CODE_OWNERS: true
        RENOVATE_LABELS: "['dependencies', 'renovate']"
        RENOVATE_PACKAGE_RULES: |
          [
            {
              "description": "Automerge everything except major updates",
              "matchUpdateTypes": ["minor", "patch", "pin", "digest", "lockFileMaintenance"],
              "automerge": true
            },
            {
              "description": "Match pnpm's minimumReleaseAge supply-chain gate, scoped to the npm manager (which is what Renovate uses for pnpm: pnpm-lock.yaml, workspaces, catalogs) so it doesn't open/rebase PRs for packages too fresh to pass pnpm install. Other ecosystems (gomod, docker, github-actions) aren't gated by pnpm, so they keep landing security patches without delay. Keep >= pnpm's value (defined in nodelib-config).",
              "matchManagers": ["npm"],
              "minimumReleaseAge": "3 days"
            },
            {
              "description": "Bump the go directive, grouped with the golang base image",
              "matchManagers": ["gomod"],
              "matchDepNames": ["go"],
              "matchDepTypes": ["golang"],
              "rangeStrategy": "bump",
              "groupName": "go toolchain"
            },
            {
              "description": "Keep the golang base image in the same PR as the go directive",
              "matchManagers": ["dockerfile", "docker-compose"],
              "matchDepNames": ["docker.io/library/golang"],
              "groupName": "go toolchain"
            },
            {
              "matchPackageNames": ["/.*a-novel-kit\\/nodelib.*/"],
              "groupName": "nodelib"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-json-keys.*/"],
              "groupName": "service json keys"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-authentication.*/"],
              "groupName": "service authentication"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/service-narrative-engine.*/"],
              "groupName": "service narrative engine"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/platform-authentication.*/"],
              "groupName": "platform authentication"
            },
            {
              "matchPackageNames": ["/.*a-novel\\/platform-narrative-engine.*/"],
              "groupName": "platform narrative engine"
            },
            {
              "matchPackageNames": ["/.*github.com\\/uptrace\\/bun.*/"],
              "groupName": "uptrace/bun"
            },
            {
              "matchPackageNames": ["/.playwright.*/"],
              "groupName": "playwright"
            },
            {
              "description": "Consolidate non-major npm updates into one PR per repo. They all edit the shared pnpm-lock.yaml, so as separate PRs they conflict pairwise and the merge queue can only land one per cycle. This rule is last so it supersedes the per-name/monorepo groups for non-major npm updates; major npm updates keep their named groups and individual review.",
              "matchManagers": ["npm"],
              "matchUpdateTypes": ["minor", "patch", "pin", "digest", "lockFileMaintenance"],
              "groupName": "javascript dependencies"
            }
          ]
        # NPM internal registries.
        RENOVATE_DETECT_HOST_RULES_FROM_ENV: true
        RENOVATE_NPM_NPM_PKG_GITHUB_COM_TOKEN: ${{ inputs.github_token }}
