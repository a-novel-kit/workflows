name: lint dockerfile
description: >
  Run hadolint over a repo's Dockerfiles. A repo with no Dockerfiles is a clean pass, so the
  job is safe to add anywhere. Advisory mode reports findings without failing, for a repo
  clearing an existing backlog before the check gates. hadolint also shellchecks each RUN block.

inputs:
  paths:
    required: false
    description: >
      Space- or newline-separated globs of Dockerfiles to lint. Empty (the default) lints every
      tracked file named `Dockerfile`, `<x>.Dockerfile` (the fleet's convention, either casing)
      or `Dockerfile.<x>` â€” the last capital-D only, because a lowercase `dockerfile.<x>` is far
      more likely to be source (`dockerfile.go`) than a Dockerfile variant. Discovery excludes
      vendored and gitignored trees. The caller must have checked the repo out for it to see them.
  advisory:
    required: false
    default: "false"
    description: >
      When "true", findings go to the run summary and the log but the check passes â€” for a repo
      adopting the lint over an existing backlog. When "false" (the default), any finding fails.
  version:
    required: false
    default: "2.12.0"
    description: >
      The hadolint release to pin â€” a `hadolint/hadolint` git tag. The binary is fetched from that
      release; it is not preinstalled on the runner as shellcheck is.

runs:
  using: composite
  steps:
    - name: hadolint
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        ADVISORY: ${{ inputs.advisory }}
        HADOLINT_VERSION: ${{ inputs.version }}
      run: |
        # errexit is disabled deliberately: hadolint exits non-zero on findings and this step
        # decides gating from that code itself, rather than aborting on it.
        set +e -u
        shopt -s nullglob
        if [ -n "${PATHS//[[:space:]]/}" ]; then
          # Word-split the caller's globs into a file list on purpose.
          # shellcheck disable=SC2206
          files=($PATHS)
        else
          # Match a bare `Dockerfile` and the fleet's `<x>.Dockerfile` in either casing, but the
          # `Dockerfile.<x>` variant form only with a capital D: a case-insensitive dotted match
          # also claims ordinary source, and `dockerfile.go` is not a Dockerfile.
          mapfile -t files < <(git ls-files \
            | grep -E '(^|/)[Dd]ockerfile$|\.[Dd]ockerfile$|(^|/)Dockerfile\.[^/]+$')
        fi
        if [ ${#files[@]} -eq 0 ]; then
          echo "No Dockerfiles to lint."
          printf '## hadolint\n\nNo Dockerfiles found â€” nothing to lint.\n' >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        bin="$RUNNER_TEMP/hadolint"
        # Retried, because this check gates: a single reset connection to the releases CDN would
        # otherwise fail the build on a repo whose Dockerfiles are fine. `--retry-all-errors` is what
        # covers a transport-level reset (curl exit 35) â€” plain `--retry` only covers transient HTTP
        # statuses and timeouts, and the reset is what was actually observed.
        if ! curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors \
          "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION#v}/hadolint-Linux-x86_64" \
          -o "$bin"; then
          echo "::error::failed to download hadolint ${HADOLINT_VERSION} after 3 retries"
          exit 1
        fi
        chmod +x "$bin"
        "$bin" "${files[@]}" > "$RUNNER_TEMP/hadolint.txt" 2>&1
        rc=$?
        cat "$RUNNER_TEMP/hadolint.txt"
        total=$(grep -cE 'DL[0-9]+|SC[0-9]+' "$RUNNER_TEMP/hadolint.txt")
        printf '## hadolint\n\n**%s** finding(s) across %s Dockerfile(s).\n' \
          "${total:-0}" "${#files[@]}" >> "$GITHUB_STEP_SUMMARY"
        if [ "$ADVISORY" = "true" ]; then
          echo "Advisory mode: findings reported without gating."
          exit 0
        fi
        exit "$rc"
