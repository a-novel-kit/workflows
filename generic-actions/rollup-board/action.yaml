name: rollup-board
description: >
  Roll each parent's board Status + Start date up from its direct children, as the
  [Agent] App. For every Epic / Feature / Initiative on the board it aggregates its
  children's statuses into one parent status — the FLOOR (least-advanced child) once all
  children are In review or above (so all-In-review → In review, all-Awaiting-release →
  Awaiting release, an Applied meta child counting as ≥ Awaiting release); any child still
  below In review → In progress; all pre-work → the most-ready. An **Initiative** is the
  exception, a tracker rather than a work item, so it holds **Tracking** until every child
  has reached Awaiting release, then rolls to the floor like the rest. It also sets the
  parent's Start date to the earliest child's. Deep trees (Initiative → Epic → Feature → Task)
  converge over successive runs (it rolls up direct children each pass), so it is
  eventually consistent under the periodic reconcile sweep that invokes it.

  Ships read-only: with dry_run "true" (the default) it only logs what it would change,
  so the aggregation can be validated against the live board before it starts moving
  statuses.

inputs:
  client_id:
    required: true
    description: Client id for the org's [Agent] bot (org Projects write).
  app_private_key:
    required: true
    description: The [Agent] bot App private key (PEM) — the AGENT_BOT_PRIVATE_KEY org secret.
  project_id:
    required: true
    description: Node id of the org "Tasks" board (PVT_…). Passed in per-org by the caller.
  dry_run:
    required: false
    default: "true"
    description: >
      When "true" (default), log the rollups it would make without writing — the
      read-only first mode. Set "false" once the aggregation is trusted.
  kill_switch:
    required: false
    default: ""
    description: >
      Org-level HALT, threaded from the caller as `kill_switch: vars.AGENT_KILL_SWITCH`
      (a composite action cannot read the `vars` context itself). FAIL-SAFE: RUNNING only when the
      value (lowercased, whitespace-stripped) is an explicit off-token — empty/unset, 0, off, false,
      no, disabled; ANYTHING ELSE (a fat-fingered value or garbage) engages the halt. When engaged
      this writer no-ops (no rollups) and exits 0 — read FIRST, before any board write (the guard and
      the rollup share one step, so the exit is sufficient here).

runs:
  using: composite
  steps:
    - name: Mint org-Projects token
      id: token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ inputs.client_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: ${{ github.repository_owner }}
        permission-organization-projects: write
        permission-issues: write # close a parent whose sub-issues are all closed (rule 5/6 archival)

    - name: Roll up epics
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
        PROJECT_ID: ${{ inputs.project_id }}
        DRY_RUN: ${{ inputs.dry_run }}
        KILL_SWITCH: ${{ inputs.kill_switch }}
      run: |
        set -euo pipefail

        # Org-level halt, read before the rollup. Fail-safe: running only for an explicit off-token
        # (empty/unset, 0, off, false, no, disabled); any other value engages the halt. The guard and
        # the Python mutation share this one step, so the `exit 0` here skips the rollup entirely.
        case "$(printf '%s' "${KILL_SWITCH:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          "" | 0 | off | false | no | disabled) : ;;  # explicit off-token / unset → running
          *)
            echo "AGENT_KILL_SWITCH engaged — skipping epic rollup (org-wide halt)." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
            ;;
        esac

        python3 - <<'PY'
        import json, os, subprocess, sys

        PROJECT = os.environ["PROJECT_ID"]
        DRY = os.environ.get("DRY_RUN", "true").strip().lower() != "false"  # default read-only; fail-safe to dry
        summary = open(os.environ["GITHUB_STEP_SUMMARY"], "a") if os.environ.get("GITHUB_STEP_SUMMARY") else None

        def emit(line):
            print(line)
            if summary:
                summary.write(line + "\n")

        def gh(query, **vars):
            cmd = ["gh", "api", "graphql", "-f", "query=" + query]
            for k, v in vars.items():
                cmd += ["-F", "%s=%s" % (k, v)]
            r = subprocess.run(cmd, capture_output=True, text=True)
            if r.returncode != 0:
                sys.stderr.write(r.stderr)
                raise SystemExit("::error::rollup-board: a GraphQL call failed")
            out = json.loads(r.stdout)
            if out.get("errors"):
                raise SystemExit("::error::rollup-board: GraphQL errors: %s" % out["errors"])
            return out

        # Resolve the Status + Start date fields once.
        fq = ('query($p:ID!){node(id:$p){... on ProjectV2{fields(first:50){nodes{'
              '... on ProjectV2FieldCommon{id name} ... on ProjectV2SingleSelectField{id name options{id name}}}}}}}')
        fields = gh(fq, p=PROJECT)["data"]["node"]["fields"]["nodes"]
        sfield = next((x for x in fields if x.get("name") == "Status"), None)
        dfield = next((x for x in fields if x.get("name") == "Start date"), None)
        if not sfield or not dfield:
            raise SystemExit("::error::rollup-board: board is missing a Status or Start date field")
        opt = {o["name"]: o["id"] for o in sfield.get("options", [])}

        # Rank statuses by the board's own option order, its canonical progression, so the
        # rollup follows what the board defines.
        ORDER = [o["name"] for o in sfield.get("options", [])]
        RANK = {s: i for i, s in enumerate(ORDER)}
        for needed in ("In review", "Done", "In progress", "Awaiting release", "Tracking"):
            if needed not in RANK:
                raise SystemExit("::error::rollup-board: board Status is missing the %r option" % needed)

        # Page the board.
        iq = ('query($proj:ID!,$cursor:String){node(id:$proj){... on ProjectV2{'
              'items(first:100,after:$cursor){pageInfo{hasNextPage endCursor}nodes{id '
              'status:fieldValueByName(name:"Status"){... on ProjectV2ItemFieldSingleSelectValue{name}} '
              'start:fieldValueByName(name:"Start date"){... on ProjectV2ItemFieldDateValue{date}} '
              'content{... on Issue{number state repository{nameWithOwner} issueType{name} '
              'parent{number repository{nameWithOwner}} subIssues(first:50){totalCount nodes{state}}}}}}}}}')
        items, cursor = [], ""
        while True:
            d = gh(iq, proj=PROJECT, **({"cursor": cursor} if cursor else {}))
            pg = d["data"]["node"]["items"]
            items += pg["nodes"]
            if not pg["pageInfo"]["hasNextPage"]:
                break
            cursor = pg["pageInfo"]["endCursor"]

        def st(it): return (it.get("status") or {}).get("name")
        def sd(it): return (it.get("start") or {}).get("date")

        # Group children by parent key; collect epic items (parents that aren't Initiatives).
        children, epics = {}, []
        for it in items:
            c = it.get("content") or {}
            if not c:
                continue
            p = c.get("parent")
            if p:
                pk = "%s#%s" % (p["repository"]["nameWithOwner"], p["number"])
                children.setdefault(pk, []).append(it)
            typ = (c.get("issueType") or {}).get("name")
            # Any parent with children rolls up, Initiatives included, so an Initiative reaches
            # Awaiting release once all its Epics do, over successive passes.
            if (c.get("subIssues") or {}).get("totalCount", 0) > 0 and typ in ("Epic", "Feature", "Initiative"):
                epics.append(it)

        def rollup_status(kids, parent_type):
            rs = [RANK[st(k)] for k in kids if st(k) in RANK]
            if not rs:
                return None
            mn, mx = min(rs), max(rs)
            # An Initiative is a tracker whose Epics carry the work, so it never shows a pickup
            # status such as Ready or In progress. It holds Tracking until every child reaches
            # Awaiting release, then rolls to the floor the way a work item does.
            if parent_type == "Initiative":
                return ORDER[mn] if mn >= RANK["Awaiting release"] else "Tracking"
            if mn >= RANK["In review"]:     # ALL children In review or above → the floor
                return ORDER[mn]            # (In review / Done / Awaiting release / Applied)
            if mx >= RANK["In progress"]:   # some child still below In review → In progress
                return "In progress"
            return ORDER[mx]                # all pre-work → most-ready

        changes = 0
        archived = 0
        arch_m = 'mutation($p:ID!,$i:ID!){archiveProjectV2Item(input:{projectId:$p,itemId:$i}){item{id}}}'
        for e in epics:
            c = e["content"]
            ek = "%s#%s" % (c["repository"]["nameWithOwner"], c["number"])

            # Parent archival: once every sub-issue is closed — children are archived and closed on
            # publish — the parent is terminal, so archive it off the board and close its tracker.
            # This propagates up over successive passes, Task to Feature to Epic to Initiative. The
            # guard needs the full node set: an epic with more than 50 sub-issues is only partly
            # visible here, and falls through to the status rollup.
            sub = c.get("subIssues") or {}
            tc = sub.get("totalCount", 0)
            nodes = sub.get("nodes") or []
            if tc > 0 and tc <= len(nodes) and all(n.get("state") == "CLOSED" for n in nodes):
                archived += 1
                emit("- %s %s: all %d sub-issue(s) closed -> archive + close"
                     % ("would archive" if DRY else "archived", ek, tc))
                if not DRY:
                    gh(arch_m, p=PROJECT, i=e["id"])
                    if c.get("state") == "OPEN":
                        subprocess.run(["gh", "issue", "close", str(c["number"]),
                                        "--repo", c["repository"]["nameWithOwner"], "--reason", "completed"],
                                       check=False, capture_output=True)
                continue

            kids = children.get(ek, [])
            if not kids:
                continue
            starts = [sd(k) for k in kids if sd(k)]
            ptyp = (c.get("issueType") or {}).get("name")
            plan = [("Status", st(e), rollup_status(kids, ptyp), False),
                    ("Start date", sd(e), (min(starts) if starts else None), True)]
            for field, cur, new, is_date in plan:
                if not new or new == cur:
                    continue
                if not is_date and new not in opt:
                    emit("::warning::%s computed Status %r has no board option — skipping" % (ek, new))
                    continue
                changes += 1
                emit("- %s %s %s: %s -> %s" % ("would set" if DRY else "set", ek, field, cur or "<unset>", new))
                if DRY:
                    continue
                if is_date:
                    gh('mutation($p:ID!,$i:ID!,$f:ID!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{date:"%s"}}){projectV2Item{id}}}' % new,
                       p=PROJECT, i=e["id"], f=dfield["id"])
                else:
                    gh('mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){updateProjectV2ItemFieldValue(input:{projectId:$p,itemId:$i,fieldId:$f,value:{singleSelectOptionId:$o}}){projectV2Item{id}}}',
                       p=PROJECT, i=e["id"], f=sfield["id"], o=opt[new])

        emit("\nrollup-board: %d parent(s) scanned, %d status change(s), %d archived (%s)." % (len(epics), changes, archived, "DRY RUN — no writes" if DRY else "written"))
        if summary:
            summary.close()
        PY
