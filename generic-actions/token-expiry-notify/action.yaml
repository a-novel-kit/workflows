name: token-expiry-notify
description: >
  Remind (via a dedicated Discord channel) before a fine-grained PAT expires, so a token the
  automation depends on — like a rule-suites read PAT, which no bot can mint — gets rotated instead
  of silently lapsing. A fine-grained PAT carries its own expiry in the
  `github-authentication-token-expiration` response header on any authenticated request; this action
  reads that header and, when the token is within `warn_days` of expiring, posts a color-coded
  Discord embed (green → red as time runs out) with the days remaining and the exact regen steps.
  Run it DAILY from the caller so the countdown updates and the color escalates. One call = one
  token = one message, so a caller checks several tokens with a matrix and each gets its own notice.
  No-ops for a token with no expiry header (a classic PAT or a non-expiring credential).

inputs:
  token:
    required: true
    description: The fine-grained PAT to check (threaded from the caller as a secret). Only its expiry header is read.
  token_name:
    required: true
    description: Human name of the token/secret (e.g. "BYPASS_AUDIT_PAT") — shown in the reminder.
  regen_md:
    required: false
    default: ""
    description: >
      Free-form Markdown appended under the header — the caller formats the regen instructions
      however it likes. Discord renders ## / ### headings, **bold**, `code`, and ``` blocks in an
      embed description, so the caller owns the layout. Empty = omit.
  webhook:
    required: false
    default: ""
    description: >
      Discord webhook URL for a DEDICATED token-expiry channel — wire it from the caller as its own
      secret (keep it separate from the escalation webhook so these maintenance nudges have their own
      home). Empty makes the action a no-op.
  warn_days:
    required: false
    default: "21"
    description: >
      Post once the token is within this many days of expiring. Set it to the token's full validity
      (e.g. 365) for a daily countdown that always posts; leave it at 21 for reminders only in the
      final stretch. The caller supplies the daily cadence.
  lifetime_days:
    required: false
    default: ""
    description: >
      The token's full validity period in days (e.g. 365). When set, the embed color reflects the
      PERCENTAGE of lifetime remaining (green >50%, yellow >25%, orange >10%, red ≤10%) and shows it;
      when empty, the color falls back to absolute days remaining (green >30, yellow >14, orange >7,
      red ≤7).
  dry_run:
    required: false
    default: "false"
    description: When "true", log the embed that would be posted without posting it.

runs:
  using: composite
  steps:
    - name: Check expiry and remind
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        TOKEN_NAME: ${{ inputs.token_name }}
        REGEN_MD: ${{ inputs.regen_md }}
        WEBHOOK: ${{ inputs.webhook }}
        WARN_DAYS: ${{ inputs.warn_days }}
        LIFETIME_DAYS: ${{ inputs.lifetime_days }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail

        # Post one embed to the webhook, retrying a failed delivery. Returns non-zero once the
        # attempts are spent, so a caller decides whether an undelivered notice fails the job.
        post_embed() { # $1=embed description  $2=decimal embed color
          local payload code attempt
          # allowed_mentions parse:[] keeps a maintenance nudge from pinging a role or @everyone.
          payload=$(jq -n --arg d "$1" --argjson c "$2" \
            '{embeds: [{description: $d, color: $c}], allowed_mentions: {parse: []}}')

          if [ "$DRY_RUN" = "true" ]; then
            { echo "[dry-run] would post the ${TOKEN_NAME} embed (color $2):"; printf '%s\n' "$1"; } \
              | tee -a "$GITHUB_STEP_SUMMARY"
            return 0
          fi

          if [ -z "${WEBHOOK:-}" ]; then
            echo "::warning::no webhook configured — can't post the \"${TOKEN_NAME}\" notice."
            return 1
          fi

          code=000
          for attempt in 1 2 3; do
            code=$(curl -sS --connect-timeout 5 --max-time 15 -o "$RUNNER_TEMP/tok_resp" -w '%{http_code}' \
              -X POST -H 'Content-Type: application/json' --data "$payload" "$WEBHOOK") || code=000
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Posted the ${TOKEN_NAME} notice (HTTP $code)." | tee -a "$GITHUB_STEP_SUMMARY"
              return 0
            fi
            echo "::warning::notice post attempt $attempt/3 failed (HTTP $code)."
            [ "$attempt" -lt 3 ] && sleep "$((attempt * attempt * 2))"
          done

          echo "::error::couldn't post the ${TOKEN_NAME} notice after 3 attempts (last HTTP $code)."
          return 1
        }

        # Classify what the credential check found. A transport failure, a credential GitHub rejects,
        # and a credential that carries no expiry are three outcomes, and only the last is benign.
        token_state() { # $1=curl exit status  $2=HTTP status  $3=expiry header value
          if [ "$1" -ne 0 ]; then printf 'unreachable'
          elif [ "$2" != "200" ]; then printf 'rejected'
          elif [ -z "$3" ]; then printf 'non-expiring'
          else printf 'expiring'
          fi
        }

        # A fine-grained PAT's expiry rides on the response header of any authenticated request. A
        # non-expiring credential, such as a classic PAT or an App token, sends no such header.
        #
        # curl runs without -f so a rejected credential still returns its status line, which is what
        # separates an expired token from a network fault and from a token that has no expiry.
        headers="$RUNNER_TEMP/tok_headers"
        curl_err="$RUNNER_TEMP/tok_curl_err"
        curl_status=0
        http_code=$(curl -sS -o /dev/null -D "$headers" -w '%{http_code}' \
          -H "Authorization: Bearer ${TOKEN}" https://api.github.com/ 2>"$curl_err") || curl_status=$?
        exp=$(grep -i '^github-authentication-token-expiration:' "$headers" 2>/dev/null \
          | sed 's/^[^:]*:[[:space:]]*//' | tr -d '\r' || true)

        case "$(token_state "$curl_status" "${http_code:-000}" "$exp")" in
          unreachable)
            echo "::error::could not reach GitHub to check \"${TOKEN_NAME}\": $(tr -d '\n' <"$curl_err")"
            exit 1
            ;;
          rejected)
            # The credential the automation depends on is already gone. This is the outcome the
            # reminder exists for, so it alerts and fails.
            alert="## 🚨 [Token] ${TOKEN_NAME} - rejected by GitHub"$'\n'"-# HTTP ${http_code} — expired, revoked, or without the access it needs. Rotate it."
            if [ -n "${REGEN_MD:-}" ]; then
              alert="${alert}"$'\n\n'"${REGEN_MD}"
            fi
            post_embed "$alert" 15158332 || true
            echo "::error::GitHub rejected \"${TOKEN_NAME}\" with HTTP ${http_code} — expired, revoked, or without the access it needs."
            exit 1
            ;;
          non-expiring)
            echo "Token \"${TOKEN_NAME}\" carries no expiry (classic PAT or App token) — nothing to remind." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
            ;;
        esac
        exp_ts=$(date -u -d "$exp" +%s 2>/dev/null || echo 0)
        if [ "$exp_ts" -eq 0 ]; then
          echo "::warning::couldn't parse the expiry \"${exp}\" for \"${TOKEN_NAME}\" — skipping."
          exit 0
        fi
        days=$(( (exp_ts - $(date -u +%s)) / 86400 ))
        [ "$days" -lt 0 ] && days=0
        echo "Token \"${TOKEN_NAME}\" expires in ${days} day(s) (${exp})." | tee -a "$GITHUB_STEP_SUMMARY"
        if [ "$days" -gt "$WARN_DAYS" ]; then
          echo "More than ${WARN_DAYS} days out — no reminder." | tee -a "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        # Color-code by percentage of lifetime left when lifetime_days is given, otherwise by
        # absolute days. Discord embed colors are decimal RGB: green 0x2ECC71, yellow 0xF1C40F,
        # orange 0xE67E22, red 0xE74C3C.
        pctline=""
        if [ -n "${LIFETIME_DAYS:-}" ] && [ "${LIFETIME_DAYS}" -gt 0 ] 2>/dev/null; then
          pct=$(( days * 100 / LIFETIME_DAYS ))
          [ "$pct" -gt 100 ] && pct=100
          pctline=" | ${pct}% left"
          if   [ "$pct" -gt 50 ]; then color=3066993
          elif [ "$pct" -gt 25 ]; then color=15844367
          elif [ "$pct" -gt 10 ]; then color=15105570
          else color=15158332; fi
        else
          if   [ "$days" -gt 30 ]; then color=3066993
          elif [ "$days" -gt 14 ]; then color=15844367
          elif [ "$days" -gt 7 ];  then color=15105570
          else color=15158332; fi
        fi

        # The whole message is the embed description, where Discord renders ## and ### headings, so
        # there is no separate title field: a header, the expiry as small grey `-#` subtext, then the
        # caller's regen Markdown.
        desc="## ⏳ [Token] ${TOKEN_NAME} - ${days} days left"$'\n'"-# Expires ${exp}${pctline}"
        if [ -n "${REGEN_MD:-}" ]; then
          desc="${desc}"$'\n\n'"${REGEN_MD}"
        fi
        desc=$(printf '%s' "$desc" | head -c 3900)
        desc=$(printf '%s' "$desc" | iconv -f UTF-8 -t UTF-8 -c 2>/dev/null) || true

        post_embed "$desc" "$color"
