name: derive-status
description: >
  Derive a Task's board Status from its pull request's current state and write it as
  the [Agent] App, so the board follows PR activity with a single writer. The mapping
  is a pure function of the PR (draft / approved / merged / closed), not of the event
  that fired â€” which is exactly why the reconcile sweep can re-run this same derivation
  to repair drift from dropped or cross-repo events. On first activity it also stamps
  the Task's Start date, once. The Task is resolved through the PR's closing-issue
  reference; a PR that closes no issue is a no-op. Writes go through board-write, so
  the board stays single-writer.

inputs:
  client_id:
    required: true
    description: Client id for the org's [Agent] bot (for the board write, via board-write).
  app_private_key:
    required: true
    description: The [Agent] bot App private key (PEM) â€” the AGENT_BOT_PRIVATE_KEY org secret.
  project_id:
    required: true
    description: Node id of the org "Tasks" board (PVT_â€¦). Passed in per-org by the caller.
  pull_request_number:
    required: false
    default: ${{ github.event.pull_request.number }}
    description: >
      Number of the PR to derive from. Defaults to the PR that triggered the run, which
      works for both pull_request and pull_request_review events; the reconcile sweep
      passes each open Task's PR explicitly.
  repo:
    required: false
    default: ${{ github.event.repository.name }}
    description: >
      Repository of the PR (name only; the owner is the workflow's org). Defaults to the
      triggering repo; the reconcile sweep passes another repo in the org to re-derive it.
  github_token:
    required: false
    default: ${{ github.token }}
    description: >
      Token for reading the PR + its closing issue. Defaults to the job's token (fine for
      a same-repo event); the reconcile sweep passes an org-wide [Agent] token so it can
      read a PR in another repo of the org.
  kill_switch:
    required: false
    default: ""
    description: >
      Org-level HALT, threaded from the caller as `kill_switch: vars.AGENT_KILL_SWITCH`
      (a composite action cannot read the `vars` context itself). FAIL-SAFE: RUNNING only when the
      value (lowercased, whitespace-stripped) is an explicit off-token â€” empty/unset, 0, off, false,
      no, disabled; ANYTHING ELSE (a fat-fingered value or garbage) engages the halt. When engaged
      this writer no-ops (no PR read, no board write) and exits 0 â€” read FIRST. Because a composite
      action has no early return (an `exit 0` in the guard step does NOT stop the later steps), the
      guard emits a `halted` output and BOTH board-write steps are `if:`-gated on it. It is also
      passed through to board-write, so the single board mutator self-guards regardless of caller.

runs:
  using: composite
  steps:
    # Read the PR and compute the target Status. This step only reads, so it runs on the
    # caller's default token with contents:read and pull-requests:read; the [Agent] token
    # is minted for the write, inside board-write.
    - name: Compute Status + resolve the Task
      id: derive
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ inputs.repo }}
        PR: ${{ inputs.pull_request_number }}
        KILL_SWITCH: ${{ inputs.kill_switch }}
      run: |
        set -euo pipefail

        # Org-level halt, read before the derivation. Fail-safe: running only for an explicit
        # off-token (empty/unset, 0, off, false, no, disabled); any other value engages the halt and
        # skips the derivation entirely. A composite action has no early return, so an `exit 0` here
        # does not stop the two board-write steps: this emits a `halted` output and every later
        # mutating step carries an `if:` on it.
        case "$(printf '%s' "${KILL_SWITCH:-}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')" in
          "" | 0 | off | false | no | disabled) : ;;  # explicit off-token / unset â†’ running
          *)
            echo "AGENT_KILL_SWITCH engaged â€” skipping board-status derivation (org-wide halt)." | tee -a "$GITHUB_STEP_SUMMARY"
            {
              echo "halted=true"
              echo "has_issue=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac

        if [ -z "${PR:-}" ]; then
          echo "::error::no PR number â€” run on a pull_request / pull_request_review event, or pass pull_request_number"
          exit 1
        fi

        q='query($owner:String!,$repo:String!,$num:Int!){ repository(owner:$owner,name:$repo){
          pullRequest(number:$num){
            state isDraft reviewDecision
            closingIssuesReferences(first:5){ nodes{ id number labels(first:20){ nodes{ name } } } } } } }'
        # A missing or inaccessible PR makes the GraphQL call error; catch it here so the failure
        # surfaces as one clear message.
        if ! pr=$(gh api graphql -f query="$q" -F owner="$OWNER" -F repo="$REPO" -F num="$PR"); then
          echo "::error::could not query PR #$PR (not found, or the token lacks access)"
          exit 1
        fi
        state=$(echo "$pr" | jq -r '.data.repository.pullRequest.state')
        draft=$(echo "$pr" | jq -r '.data.repository.pullRequest.isDraft')
        review=$(echo "$pr" | jq -r '.data.repository.pullRequest.reviewDecision // ""')

        # A PR the query could not resolve comes back null; fail here so the message names
        # the real problem.
        if [ -z "$state" ] || [ "$state" = "null" ]; then
          echo "::error::PR #$PR not found or inaccessible (check the number and token access)"
          exit 1
        fi

        # A Task pairs with exactly one PR, so there is normally one closing ref. A PR that
        # closes several resolves to the lowest-numbered one, which is deterministic across
        # re-runs; the reconcile sweep derives the others from their own PRs.
        refs=$(echo "$pr" | jq '.data.repository.pullRequest.closingIssuesReferences.nodes')
        ref_count=$(echo "$refs" | jq 'length')
        issue_id=$(echo "$refs" | jq -r 'sort_by(.number) | .[0].id // empty')
        # Labels of the selected closing issue: a hotfix cleanup Task carries `hotfix-reconcile`,
        # which makes Done its terminal MERGED status.
        issue_labels=$(echo "$refs" | jq -c 'sort_by(.number) | (.[0].labels.nodes // []) | map(.name)')
        if [ "$ref_count" -gt 1 ]; then
          echo "::warning::PR #$PR closes $ref_count issues; deriving the lowest-numbered. The reconcile sweep covers the rest."
        fi

        # A pure function of the PR's current state: the reconcile sweep re-runs it and has
        # to reach the same answer whatever event fired.
        case "$state" in
          MERGED)
            # A hotfix-reconcile cleanup Task is terminal on merge: the forward-port landed and a
            # hotfix cuts its own tag off the reconcile's baseline, so nothing else ships it.
            if printf '%s' "$issue_labels" | jq -e 'index("hotfix-reconcile")' >/dev/null 2>&1; then
              status="Done"
            else
              status="Awaiting release"
            fi
            ;;
          CLOSED) status="Ready" ;; # closed unmerged â†’ the attempt was abandoned; back to actionable
          OPEN)
            if [ "$draft" = "true" ]; then
              status="In progress"
            elif [ "$review" = "APPROVED" ]; then
              status="Done"
            else
              status="In review"
            fi
            ;;
          *)
            echo "::error::unexpected PR state '$state'"
            exit 1
            ;;
        esac

        if [ -z "$issue_id" ]; then
          echo "PR #$PR closes no issue â€” nothing to derive." | tee -a "$GITHUB_STEP_SUMMARY"
          echo "has_issue=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # A Task is "activated" once it moves past the pre-PR Backlog/Ready states, which is
        # when it earns a Start date. A PR closed unmerged falls back to Ready and stamps
        # nothing.
        activated=false
        case "$status" in
          "In progress" | "In review" | "Done" | "Awaiting release") activated=true ;;
        esac

        {
          echo "has_issue=true"
          echo "issue_id=$issue_id"
          echo "status=$status"
          echo "activated=$activated"
          echo "today=$(date -u +%Y-%m-%d)"
        } >> "$GITHUB_OUTPUT"
        echo "PR #$PR ($state, draft=$draft, review=${review:-none}) â†’ \"$status\" on issue $issue_id." \
          | tee -a "$GITHUB_STEP_SUMMARY"

    # Write the derived Status. board-write mints the [Agent] token, resolves the item,
    # adding it if absent, and compares before writing. The ref is pinned externally, since a `./`
    # path resolves against the consumer repo's workspace.
    - name: Write Status
      # A composite action has no early return, so the guard step's exit 0 does not stop this
      # mutating step; the `halted` gate does.
      if: ${{ steps.derive.outputs.has_issue == 'true' && steps.derive.outputs.halted != 'true' }}
      uses: a-novel-kit/workflows/generic-actions/board-write@v1.20.2
      with:
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}
        project_id: ${{ inputs.project_id }}
        content_id: ${{ steps.derive.outputs.issue_id }}
        field: Status
        value: ${{ steps.derive.outputs.status }}
        kill_switch: ${{ inputs.kill_switch }}

    # Stamp Start date once, on first activity. only_if_empty keeps a re-run or the
    # sweep from moving an already-set start date.
    - name: Stamp Start date (once)
      # The `halted` gate again: the guard's exit 0 cannot stop this later step.
      if: ${{ steps.derive.outputs.has_issue == 'true' && steps.derive.outputs.activated == 'true' && steps.derive.outputs.halted != 'true' }}
      uses: a-novel-kit/workflows/generic-actions/board-write@v1.20.2
      with:
        client_id: ${{ inputs.client_id }}
        app_private_key: ${{ inputs.app_private_key }}
        project_id: ${{ inputs.project_id }}
        content_id: ${{ steps.derive.outputs.issue_id }}
        field: Start date
        value: ${{ steps.derive.outputs.today }}
        only_if_empty: "true"
        kill_switch: ${{ inputs.kill_switch }}
